name: default
on:
  push:
    branches:
      - "**"
permissions:
  contents: read
  packages: read
jobs:
  check:
    runs-on: namespace-profile-2x4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
      - uses: actions/setup-python@v5
        with:
          python-version-file: ./workers/python/.python-version
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: bufbuild/buf-setup-action@v1.35.1
        with:
          buf_user: frankgrecojr
          buf_api_token: ${{ secrets.BUF_APIKEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - run: make deps
      - run: pnpm install
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: pre-commit/action@v3.0.1
      - uses: azure/setup-helm@v4
        with:
          version: "v3.9.0"
      - run: helm repo add bitnami https://charts.bitnami.com/bitnami
      - run: make helm-template
      - run: make check
        working-directory: workers/javascript
      - run: |
          make deps-dev
          CHECK=true make fmt
        working-directory: workers/python
  test-go:
    runs-on: namespace-profile-2x4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: .go-version
      - name: unit tests
        run: make test-unit GO_TEST_ARGS="-v -cover -covermode atomic -race"
      - name: integration tests
        run: make test-integration
      - name: upload coverage report to codecov
        uses: codecov/codecov-action@v4
        with:
          name: ${{ github.job }}
          fail_ci_if_error: true
          flags: test-go
          token: ${{ secrets.CODECOV_TOKEN }}
  test-js:
    runs-on: namespace-profile-4x8
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: |
          make build
          npx pnpm --filter @superblocks/worker.js test:unit
          npx pnpm --no-bail --filter "@superblocksteam/*" --filter "!@superblocksteam/gsheets" --filter "!@superblocksteam/agent-sdk" test --testPathIgnorePatterns "(e2e|integration|local).test.ts"
        working-directory: workers/javascript
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: codecov/codecov-action@v4
        with:
          name: ${{ github.job }}
          fail_ci_if_error: true
          flags: test-js
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: workers/javascript
  test-py:
    runs-on: namespace-profile-4x8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version-file: ./workers/python/.python-version
      - run: |
          pip3 install tox
          make test TOX_EXTRA_ARGS="--cov-report lcov:coverage.out"
        working-directory: workers/python
      - uses: codecov/codecov-action@v4
        with:
          name: ${{ github.job }}
          fail_ci_if_error: true
          flags: test-py
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: workers/python
