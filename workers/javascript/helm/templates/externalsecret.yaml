{{- if .Values.externalSecrets.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: workers-agent-key
  annotations:
    external-secrets.io/force-sync: {{ now | date "2006-01-02T15:04:05Z" | quote }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind | default "ClusterSecretStore" }}
  target:
    name: workers-agent-key
    creationPolicy: Owner
  data:
    {{- toYaml .Values.externalSecrets.agentKey.data | nindent 4 }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
