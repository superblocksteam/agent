{{- $fullname := include "sandbox_workers.fullname" . }}
{{- range $k, $v := .Values.fleets }}
{{- $fleetKeda := $v.keda | default dict }}
{{- $minReplicas := $.Values.keda.minReplicaCount }}
{{- if hasKey $fleetKeda "minReplicaCount" }}
{{- $minReplicas = index $fleetKeda "minReplicaCount" }}
{{- end }}
{{- $hasTriggers := or (index $fleetKeda "triggers") $.Values.keda.triggers }}
{{- $mergeFlag := $.Values.keda.triggersMerge | default false }}
{{- if hasKey $fleetKeda "triggersMerge" }}
{{- $mergeFlag = index $fleetKeda "triggersMerge" }}
{{- end }}
{{- $triggersMerge := and $hasTriggers $mergeFlag }}
{{- $fleetTriggers := index $fleetKeda "triggers" | default $.Values.keda.triggers | default list }}
{{- $triggerStreamsByIndex := include "sandbox_workers.fleetTriggerStreams" (dict "fleet" $v "workerValues" $.Values.worker) | fromJson -}}
{{- $triggerStreamCount := len $triggerStreamsByIndex -}}
{{- $triggerStreams := list -}}
{{- range $i := until $triggerStreamCount -}}
{{- $triggerStreams = append $triggerStreams (index $triggerStreamsByIndex ($i | toString)) -}}
{{- end -}}
{{- $renderGeneratedTriggers := or (not $hasTriggers) $triggersMerge }}
{{- $hasPrometheus := and $renderGeneratedTriggers $.Values.keda.prometheusServerAddress }}
{{- $hasCron := eq (include "sandbox_workers.kedaHasCronTrigger" (dict "triggers" $fleetTriggers)) "true" }}
{{- $useScalingModifiers := and $renderGeneratedTriggers (eq (include "sandbox_workers.kedaUseScalingModifiers" (dict "triggerStreams" $triggerStreams "hasPrometheus" $hasPrometheus "hasCron" $hasCron)) "true") }}
{{- $execPoolSize := (($v.queue).executionPool) | default $.Values.queue.executionPool | default 1 }}
{{- $lagCount := include "sandbox_workers.kedaLagCount" (dict "fleetKeda" $fleetKeda "executionPool" $execPoolSize) | trim }}
{{- $activationLagCount := index $fleetKeda "activationLagCount" | default $.Values.keda.activationLagCount | default "1" }}
{{- /* Prometheus warm buffer: minReplicaCount on ScaledObject is the off-hours floor; cron desiredReplicas is the business-hours buffer size. */}}
{{- $promBuffer := $minReplicas }}
{{- range $fleetTriggers }}
{{- if eq (index . "type") "cron" }}
{{- with index .metadata "desiredReplicas" }}
{{- $promBuffer = . | int }}
{{- end }}
{{- end }}
{{- end }}
{{- $extraWarm := sub ($promBuffer | int) ($minReplicas | int) }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ printf "%s-%s" $fullname $k | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "sandbox.worker.labels" $v | nindent 4 }}
spec:
  advanced:
    horizontalPodAutoscalerConfig:
      # Name the HPA explicitly. Otherwise KEDA derives "keda-hpa-<scaledobject>",
      # and that 9-char prefix can push the name past Kubernetes' 63-char limit,
      # which the KEDA admission webhook rejects. Truncate to keep it valid.
      name: {{ printf "keda-hpa-%s-%s" $fullname $k | trunc 63 | trimSuffix "-" }}
    {{- if $useScalingModifiers }}
    scalingModifiers:
      # AverageValue with target "1" makes the HPA scale to ceil(formula) i.e. the desired replica count.
      metricType: AverageValue
      target: "1"
      activationTarget: {{ $activationLagCount | quote }}
      formula: {{ include "sandbox_workers.kedaScalingModifiersFormula" (dict "streamCount" (len $triggerStreams) "lagCount" $lagCount "hasPrometheus" $hasPrometheus "hasCron" $hasCron) | quote }}
    {{- end }}
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ printf "%s-%s" $fullname $k | trunc 63 | trimSuffix "-" }}
  pollingInterval: {{ ($v.keda | default dict).pollingInterval | default $.Values.keda.pollingInterval }}
  cooldownPeriod: {{ ($v.keda | default dict).cooldownPeriod | default $.Values.keda.cooldownPeriod | default 30 }}
  minReplicaCount: {{ $minReplicas }}
  maxReplicaCount: {{ if hasKey $fleetKeda "maxReplicaCount" }}{{ index $fleetKeda "maxReplicaCount" }}{{ else }}{{ $.Values.keda.maxReplicaCount }}{{ end }}
  {{- if $.Values.keda.prometheusServerAddress }}
  fallback:
    failureThreshold: {{ $.Values.keda.fallbackFailureThreshold | default 3 }}
    replicas: {{ max ($minReplicas | int) ($promBuffer | int) }}
  {{- end }}
  triggers:
  {{- if $hasTriggers }}
    {{- range $fleetTriggers }}
    {{- if and $useScalingModifiers (eq .type "cron") }}
    - type: cron
      name: cron
      metadata:
        {{- toYaml .metadata | nindent 8 }}
    {{- else }}
    {{- toYaml (list .) | nindent 4 }}
    {{- end }}
    {{- end }}
  {{- end }}
  {{- if $renderGeneratedTriggers }}
    {{- range $i, $stream := $triggerStreams }}
    - type: redis-streams
      {{- if $useScalingModifiers }}
      name: {{ include "sandbox_workers.kedaRedisStreamTriggerName" (dict "index" $i) }}
      {{- end }}
      metadata:
        host: {{ $.Values.queue.host }}
        port: {{ $.Values.queue.port | quote }}
        enableTLS: {{ $.Values.queue.tls | quote }}
        stream: {{ $stream }}
        consumerGroup: {{ $v.consumerGroup }}
        {{- with $lagCount }}
        lagCount: {{ . | quote }}
        {{- end }}
        activationLagCount: {{ $activationLagCount | quote }}
      authenticationRef:
        name: {{ printf "%s-redis-trigger-auth" $fullname | trunc 63 | trimSuffix "-" }}
    {{- end }}
    {{- if $hasPrometheus }}
    {{- $promAddr := $.Values.keda.prometheusServerAddress }}
    {{- if eq $promAddr "auto" }}
    {{- $promAddr = include "sandbox_workers.autoPromQueryUrl" $ | trim }}
    {{- end }}
    # Metrics-based trigger: desired replicas = ceil(in_use / executionPool) + degraded_workers + minReplicaCount + extraWarm when load is high.
    # Each replica serves executionPool concurrent events (requests), so dividing gives the
    # number of fully-occupied workers (task-managers); adding minReplicaCount maintains the warm buffer.
    # worker_degraded_mode (summed by fleet) adds one desired replica per task-manager that cannot admit work.
    #
    # promBuffer is minReplicaCount unless a cron trigger sets desiredReplicas (e.g. business-hours warm capacity).
    # extraWarm (= promBuffer - minReplicaCount) applies only when in_use exceeds the cron warm-pool capacity (extraWarm * executionPool).
    #
    # With no cron (extraWarm=0), this reduces to ceil(in_use / executionPool) + sum(degraded) + minReplicas.
    # With prom/cron + redis, scalingModifiers adds ceil(total stream lag / lagCount) on top of max(prom, cron).
    - type: prometheus
      {{- if $useScalingModifiers }}
      name: prom
      {{- end }}
      metricType: AverageValue
      metadata:
        serverAddress: {{ $promAddr }}
        query: {{ include "sandbox_workers.kedaPrometheusQuery" (dict "fleet" $k "execPoolSize" $execPoolSize "minReplicas" $minReplicas "extraWarm" $extraWarm) | quote }}
        threshold: "1"
        activationThreshold: "0"
    {{- end }}
  {{- end }}
{{- end }}
