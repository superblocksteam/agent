{{- $fullname := include "sandbox_workers.fullname" . }}
{{- range $k, $v := .Values.fleets }}
{{- $fleetKeda := $v.keda | default dict }}
{{- $minReplicas := $.Values.keda.minReplicaCount }}
{{- if hasKey $fleetKeda "minReplicaCount" }}
{{- $minReplicas = index $fleetKeda "minReplicaCount" }}
{{- end }}
{{- $hasTriggers := or (index $fleetKeda "triggers") $.Values.keda.triggers }}
{{- $mergeFlag := $.Values.keda.triggersMerge | default false }}
{{- if hasKey $fleetKeda "triggersMerge" }}
{{- $mergeFlag = index $fleetKeda "triggersMerge" }}
{{- end }}
{{- $triggersMerge := and $hasTriggers $mergeFlag }}
{{- /* Prometheus warm buffer: minReplicaCount on ScaledObject is the off-hours floor; cron desiredReplicas is the business-hours buffer size. */}}
{{- $promBuffer := $minReplicas }}
{{- range index $fleetKeda "triggers" | default list }}
{{- if eq (index . "type") "cron" }}
{{- with index .metadata "desiredReplicas" }}
{{- $promBuffer = . | int }}
{{- end }}
{{- end }}
{{- end }}
{{- $extraWarm := sub ($promBuffer | int) ($minReplicas | int) }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ printf "%s-%s" $fullname $k | trunc 63 | trimSuffix "-" }}
  labels:
    {{- include "sandbox.worker.labels" $v | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ printf "%s-%s" $fullname $k | trunc 63 | trimSuffix "-" }}
  pollingInterval: {{ ($v.keda | default dict).pollingInterval | default $.Values.keda.pollingInterval }}
  cooldownPeriod: {{ ($v.keda | default dict).cooldownPeriod | default $.Values.keda.cooldownPeriod | default 30 }}
  minReplicaCount: {{ $minReplicas }}
  maxReplicaCount: {{ if hasKey $fleetKeda "maxReplicaCount" }}{{ index $fleetKeda "maxReplicaCount" }}{{ else }}{{ $.Values.keda.maxReplicaCount }}{{ end }}
  {{- if $.Values.keda.prometheusServerAddress }}
  fallback:
    failureThreshold: {{ $.Values.keda.fallbackFailureThreshold | default 3 }}
    replicas: {{ max 1 (max ($minReplicas | int) ($promBuffer | int)) }}
  {{- end }}
  triggers:
  {{- if $hasTriggers }}
    {{- toYaml (index $fleetKeda "triggers" | default $.Values.keda.triggers) | nindent 4 }}
  {{- end }}
  {{- if or (not $hasTriggers) $triggersMerge }}
    {{- range $v.triggerStreams }}
    - type: redis-streams
      metadata:
        host: {{ $.Values.queue.host }}
        port: {{ $.Values.queue.port | quote }}
        enableTLS: {{ $.Values.queue.tls | quote }}
        stream: {{ . }}
        consumerGroup: {{ $v.consumerGroup }}
        {{- with index $fleetKeda "lagCount" | default $.Values.keda.lagCount }}
        lagCount: {{ . | quote }}
        {{- end }}
        activationLagCount: {{ index $fleetKeda "activationLagCount" | default $.Values.keda.activationLagCount | default "1" | quote }}
      authenticationRef:
        name: {{ printf "%s-redis-trigger-auth" $fullname | trunc 63 | trimSuffix "-" }}
    {{- end }}
    {{- if $.Values.keda.prometheusServerAddress }}
    {{- $promAddr := $.Values.keda.prometheusServerAddress }}
    {{- if eq $promAddr "auto" }}
    {{- $promAddr = include "sandbox_workers.autoPromQueryUrl" $ | trim }}
    {{- end }}
    {{- $execPoolSize := (($v.queue).executionPool) | default $.Values.queue.executionPool | default 1 }}
    # Metrics-based trigger: desired replicas = ceil(in_use / executionPool) + minReplicaCount + extraWarm when load is high.
    # Each replica serves executionPool concurrent events (requests), so dividing gives the
    # number of fully-occupied workers (task-managers); adding minReplicaCount maintains the warm buffer.
    #
    # promBuffer is minReplicaCount unless a cron trigger sets desiredReplicas (e.g. business-hours warm capacity).
    # extraWarm (= promBuffer - minReplicaCount) applies only when in_use exceeds the cron warm-pool capacity (extraWarm * executionPool).
    #
    # With no cron (extraWarm=0), this reduces to ceil(in_use / executionPool) + minReplicas.
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: {{ $promAddr }}
        query: ceil((sum(sandbox_execution_pool_in_use{fleet="{{ $k }}"}) or vector(0)) / {{ $execPoolSize }}) + {{ $minReplicas }} + ((sum(sandbox_execution_pool_in_use{fleet="{{ $k }}"}) or vector(0)) >bool {{ mul $extraWarm $execPoolSize }}) * {{ $extraWarm }}
        threshold: "1"
        activationThreshold: "0"
    {{- end }}
  {{- end }}
{{- end }}
