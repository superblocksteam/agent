---
# Fleets configuration - each fleet is a ScaledJob
# Example:
# fleets:
#   python-ba:
#     language: python
#     consumerGroup: ephemeral-python
#     ephemeral: true
#     plugins:
#       - python
#     events:
#       - execute
#     triggerStreams:
#       - agent.main.bucket.BA.ephemeral.plugin.python.event.execute
#       - agent.main.bucket.BE.ephemeral.plugin.python.event.execute
#     streams:
#       - agent.main.bucket.BA.ephemeral.plugin.python.event.execute
#       - agent.main.bucket.BE.ephemeral.plugin.python.event.execute
#     # Per-fleet KEDA configuration (overrides global keda.*)
#     keda:
#       lagCount: "1"           # Target lag per pod for scaling
#       activationLagCount: "1" # Minimum lag before scaling starts
#     shutdown:
#       terminationGracePeriodSeconds: 600
#       delay: 1m
#       maxJitter: 5m
#   javascript-ba:
#     language: javascript
#     buckets:
#       - BA
#     consumerGroup: ephemeral-javascript
#     ephemeral: true
#     plugins:
#       - '*'
#       - '-javascript'
#       - '-python'
#     events:
#       - execute
#       - metadata
#       - test
#       - pre_delete
#     # Verbatim triggers configuration (use for full control)
#     keda:
#       triggers:
#         - type: redis-streams
#           metadata:
#             address: redis:6379
#             stream: agent.main.bucket.BA.ephemeral.plugin.javascript.event.execute
#             consumerGroup: ephemeral-javascript
#             lagCount: "1"
#             activationLagCount: "1"
#     shutdown:
#       terminationGracePeriodSeconds: 600
#       delay: 1m
#       maxJitter: 5m
#     # Optional: override chart-wide sandbox.poolSize for this fleet only
#     sandbox:
#       poolSize: 3
#     # Optional: override chart-wide queue.executionPool for this fleet only
#     queue:
#       executionPool: 2
fleets: {}
# Task Manager configuration
taskManager:
  # Expose a stable Kubernetes Service in front of task-manager pods.
  # Disabled by default — production uses direct pod IPs via env vars.
  # Enable in CI so e2e tests can reach the task-manager HTTP gateway via
  # a predictable DNS name without relying on dynamic pod IPs.
  #
  # NOTE: This Service is headless (clusterIP: None) with publishNotReadyAddresses: true,
  # which means DNS may return IPs for pods that are still starting up (sandbox not yet
  # connected). Clients may get connection errors until pods are fully ready. This is
  # intentional for CI test use; avoid enabling in production.
  service:
    enabled: false
  image:
    repository: ghcr.io/superblocksteam/task-manager
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 128Mi
  # Additional args to pass to the task-manager
  extraArgs: []
  # Health file path for file-based probes
  healthFilePath: /tmp/worker_healthy
  # Set to false to disable all probes (startup, readiness, liveness)
  probesEnabled: true
  # Startup probe - checks if health file exists (created when Redis and sandbox are ready)
  startupProbe:
    exec:
      command:
        - cat
        - /tmp/worker_healthy
    failureThreshold: 30 # Allow up to 60 seconds for startup (30 * 2s)
    periodSeconds: 2
  # Readiness probe - checks if Redis and sandbox are reachable
  readinessProbe:
    exec:
      command:
        - cat
        - /tmp/worker_healthy
  # Liveness probe - checks if task-manager and sandbox are alive
  livenessProbe:
    exec:
      command:
        - cat
        - /tmp/worker_healthy
  # Shutdown configuration - termination grace period and delay before draining the worker
  shutdown:
    terminationGracePeriodSeconds: 600 # 10 minutes
    # Base delay before, after receiving a termination signal, before draining the worker.
    delay: 1m
    # Maximum jitter to add to the base delay.
    maxJitter: 5m
# Sandbox configurations (per language)
sandbox:
  # Default gRPC port for sandbox pods (used in NetworkPolicy)
  port: 50051
  # Number of sandbox Jobs per task-manager pod (dynamic mode only; use 1 for static sandbox.address)
  poolSize: 1
  # Runtime class for sandbox pods (e.g., gvisor for secure isolation)
  # Falls back to global runtimeClassName if not set
  runtimeClassName: ""
  python:
    image:
      repository: ghcr.io/superblocksteam/python-sandbox
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 4Gi
      requests:
        cpu: 300m
        memory: 700Mi
    port: 50051
    # Additional args/env for the python sandbox
    extraEnv: []
  javascript:
    image:
      repository: ghcr.io/superblocksteam/javascript-sandbox
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 4Gi
      requests:
        cpu: 300m
        memory: 700Mi
    port: 50051
    # Additional args/env for the javascript sandbox
    extraEnv: []
# Sandbox Job configuration
# Task-manager creates sandbox Jobs dynamically for each execution
sandboxJob:
  # Auto-delete job immediately after completion (success or failure)
  ttlSecondsAfterFinished: 0
  # No restart attempts on failure
  backoffLimit: 0
# KEDA ScaledJob configuration
keda:
  pollingInterval: 5
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  ttlSecondsAfterFinished: 0 # Auto-cleanup completed pods immediately
  maxReplicaCount: 100
  minReplicaCount: 0
  scalingStrategy:
    strategy: default
    multipleScalersCalculation: "sum"
  # Scaling triggers - typically Redis stream length
  triggers: []
  # Example:
  # triggers:
  #   - type: redis-streams
  #     metadata:
  #       address: redis:6379
  #       stream: sandbox:work:python
  #       consumerGroup: ephemeral-python
  #       lagCount: "1"
  #       activationLagCount: "1"
# Redis transport configuration
queue:
  deploy: false # Set to true to deploy Redis as a subchart (for local/CI testing)
  tls: false
  host: redis
  servername: ""
  port: 6379
  password: ""
  blockDuration: 5s
  batchSize: 10
  executionPool: 100
  pool:
    min: 5
    max: 10
  timeout:
    dial: 5s
    read: 5m
    write: 10s
    pool: 5m
  degradedMode:
    backoff: 1s
    maxTime: 10m
# Redis kvstore configuration
kvstore:
  deploy: false # Set to true to deploy Redis as a subchart (for local/CI testing)
  tls: false
  host: redis
  servername: ""
  port: 6379
  password: ""
  pool:
    min: 5
    max: 10
  timeout:
    dial: 5s
    read: 5m
    write: 10s
    pool: 5m
# Variable Store gRPC service configuration
variableStore:
  grpc:
    port: 50050
  http:
    port: 8080
# Streaming Proxy gRPC service configuration
streamingProxy:
  grpc:
    port: 50052
# Integration executor configuration
# When enabled, the task-manager runs a gRPC service that allows sandboxed code
# to execute integrations by proxying requests to the orchestrator.
# Requires orchestrator gRPC service to be accessible from task-manager pods.
integrationExecutor:
  enabled: false
  grpc:
    port: 50053
  # Internal gRPC address of the orchestrator (e.g., "orchestrator-grpc:8081").
  # Required when integration executor is enabled.
  orchestratorGrpcAddress: ""
# Worker configuration
worker:
  group: main
  events:
    - execute
# Observability
observability:
  logging:
    level: info
  metrics:
    url: ""
  tracing:
    url: ""
telemetry:
  deploymentType: "cloud"
# Superblocks configuration
superblocks:
  key: <override>
  # Platform-managed SSH tunnel private keys (only needed for integration fleets)
  # Leave empty to omit the K8s Secret; set values when externalSecrets.enabled is false.
  tunnelPrivateKeyRSA: ""
  tunnelPrivateKeyEd25519: ""
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: "aws-secrets-manager"
    kind: "ClusterSecretStore"
  # Configure remote refs for each secret when externalSecrets.enabled is true.
  # Set remoteRef.key to the AWS Secrets Manager path for each value.
  agentKey:
    data:
      - secretKey: key
        remoteRef:
          key: ""
  queueRedis:
    data:
      - secretKey: token
        remoteRef:
          key: ""
  kvstoreRedis:
    data:
      - secretKey: token
        remoteRef:
          key: ""
# Pod configuration
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
podAnnotations: {}
# Network isolation configuration
# Blocks sandbox from accessing internal infrastructure via iptables
network:
  # VPC CIDR to block - set this to your cloud VPC range
  # Leave empty to block ALL RFC 1918 private ranges (10.x, 172.16.x, 192.168.x)
  vpcCIDR: ""
  # External HTTPS/gRPC callback ports that task-manager can egress to.
  # Keep this list minimal; override per environment when needed.
  taskManagerAllowedExternalPorts:
    - 443
  # Kubernetes service CIDR (blocks access to k8s services)
  serviceCIDR: ""
  # Additional CIDRs to block (list)
  additionalBlockedCIDRs: []
  # Additional CIDRs to allow (list) - for customer internal APIs that should be accessible
  # These CIDRs will be explicitly allowed even if they fall within blocked ranges
  additionalAllowedCIDRs: []
# gVisor runtime class name (if using gVisor for sandbox isolation)
# Set this to your gVisor RuntimeClass name (e.g., "gvisor", "runsc")
runtimeClassName: ""
# Image pull secrets
image:
  credentials:
    registry: ghcr.io
    username: '<override>'
    password: '<override>'
