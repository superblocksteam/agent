---
# Fleets configuration - each fleet is a Deployment + KEDA ScaledObject
# Example:
# fleets:
#   python-ba:
#     language: python
#     consumerGroup: ephemeral-python
#     ephemeral: true
#     plugins:
#       - python
#     events:
#       - execute
#     triggerStreams:
#       - agent.main.bucket.BA.ephemeral.plugin.python.event.execute
#       - agent.main.bucket.BE.ephemeral.plugin.python.event.execute
#     streams:
#       - agent.main.bucket.BA.ephemeral.plugin.python.event.execute
#       - agent.main.bucket.BE.ephemeral.plugin.python.event.execute
#     # Per-fleet KEDA configuration (overrides global keda.*)
#     keda:
#       lagCount: "1"           # Target lag per pod for scaling
#       activationLagCount: "1" # Minimum lag before scaling starts
#     shutdown:
#       terminationGracePeriodSeconds: 600
#       delay: 1m
#       maxJitter: 5m
#   javascript-ba:
#     language: javascript
#     buckets:
#       - BA
#     consumerGroup: ephemeral-javascript
#     ephemeral: true
#     includeStandardStreams: true
#     streamVariants:
#       - ephemeral
#       - canary
#     plugins:
#       - '*'
#       - '-javascript'
#       - '-python'
#     events:
#       - execute
#       - metadata
#       - test
#       - pre_delete
#     # Verbatim triggers configuration (use for full control)
#     keda:
#       triggers:
#         - type: redis-streams
#           metadata:
#             address: redis:6379
#             stream: agent.main.bucket.BA.ephemeral.plugin.javascript.event.execute
#             consumerGroup: ephemeral-javascript
#             lagCount: "1"
#             activationLagCount: "1"
#     shutdown:
#       terminationGracePeriodSeconds: 600
#       delay: 1m
#       maxJitter: 5m
#     # Optional: override chart-wide sandbox settings for this fleet only
#     sandbox:
#       poolSize: 3
#       gracefulShutdownTimeout: 90s
#     # Optional: override chart-wide queue.executionPool for this fleet only
#     queue:
#       executionPool: 2
fleets: {}
# Task Manager configuration
taskManager:
  # Expose a stable Kubernetes Service in front of task-manager pods.
  # Disabled by default — production uses direct pod IPs via env vars.
  # Enable in CI so e2e tests can reach the task-manager HTTP gateway via
  # a predictable DNS name without relying on dynamic pod IPs.
  #
  # NOTE: This Service is headless (clusterIP: None) with publishNotReadyAddresses: true,
  # which means DNS may return IPs for pods that are still starting up (sandbox not yet
  # connected). Clients may get connection errors until pods are fully ready. This is
  # intentional for CI test use; avoid enabling in production.
  service:
    enabled: false
  image:
    repository: ghcr.io/superblocksteam/task-manager
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 128Mi
  # Additional args to pass to the task-manager
  extraArgs: []
  # Health file path for file-based probes
  healthFilePath: /tmp/worker_healthy
  # Set to false to disable all probes (startup, readiness, liveness)
  probesEnabled: true
  # Startup probe - checks if health file exists (created when Redis and sandbox are ready)
  startupProbe:
    exec:
      command:
        - cat
        - /tmp/worker_healthy
    failureThreshold: 30 # Allow up to 60 seconds for startup (30 * 2s)
    periodSeconds: 2
  # Readiness probe - checks if Redis and sandbox are reachable
  readinessProbe:
    exec:
      command:
        - cat
        - /tmp/worker_healthy
  # Liveness probe - checks if task-manager and sandbox are alive
  livenessProbe:
    exec:
      command:
        - cat
        - /tmp/worker_healthy
  # Shutdown configuration - termination grace period and delay before draining the worker
  shutdown:
    terminationGracePeriodSeconds: 600 # 10 minutes
    # Base delay before, after receiving a termination signal, before draining the worker.
    delay: 1m
    # Maximum jitter to add to the base delay.
    maxJitter: 5m
# Sandbox configurations (per language)
sandbox:
  # Default gRPC port for sandbox pods (used in NetworkPolicy)
  port: 50051
  # Number of sandbox Jobs per task-manager pod (dynamic mode only; use 1 for static sandbox.address)
  poolSize: 1
  # Maximum time sandbox pods may drain in-flight requests after receiving a SIGTERM/SIGINT.
  gracefulShutdownTimeout: 10m
  # Runtime class for sandbox pods (e.g., gvisor for secure isolation)
  # Falls back to global runtimeClassName if not set
  runtimeClassName: ""
  # Annotations to add to sandbox pod templates.
  # Can be overridden per-language (sandbox.python.podAnnotations) or per-fleet (fleets.<name>.sandbox.podAnnotations).
  # Merging order (later takes precedence): global sandbox.podAnnotations < language < fleet.
  podAnnotations: {}
  python:
    image:
      repository: ghcr.io/superblocksteam/python-sandbox
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 4Gi
      requests:
        cpu: 300m
        memory: 700Mi
    port: 50051
    # Additional args/env for the python sandbox
    extraEnv: []
    # Python sandboxes don't gracefully handle SIGTERM yet, so prevent Karpenter disruption.
    # This can be removed once graceful shutdown is implemented for Python sandboxes.
    podAnnotations:
      karpenter.sh/do-not-disrupt: "true"
  javascript:
    image:
      repository: ghcr.io/superblocksteam/javascript-sandbox
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 4Gi
      requests:
        cpu: 300m
        memory: 700Mi
    port: 50051
    # Additional args/env for the javascript sandbox
    extraEnv: []
# Sandbox Job configuration
# Task-manager creates sandbox Jobs dynamically for each execution
sandboxJob:
  # Auto-delete job immediately after completion (success or failure)
  ttlSecondsAfterFinished: 0
# KEDA ScaledObject configuration
keda:
  pollingInterval: 5
  cooldownPeriod: 300
  # Prometheus HTTP API base URL for KEDA's prometheus scaler (PromQL).
  # - "auto": deploy in-chart OTel Collector + Prometheus. Task-managers send OTLP to that
  #   collector (not to observability.metrics.url). Optional fan-out from the collector uses
  #   observability.metrics.url first, then observability.metrics.forwardUrl if url is empty
  #   (see observability.metrics).
  # - Any other non-empty URL: KEDA queries that Prometheus (or compatible) instance; task-managers
  #   send OTLP to observability.metrics.url only.
  prometheusServerAddress: ""
  # When prometheusServerAddress is "auto", Calico policies restrict who can reach the in-chart
  # OTel collector (OTLP) and Prometheus (:9090 remote-write + PromQL). Must list every
  # namespace that runs KEDA components that query Prometheus (often "keda"; some installs use
  # "keda-system").
  prometheusQueryClientNamespaces:
    - keda
  # Container images for in-chart components (override for mirroring or air-gapped registries).
  collector:
    image:
      repository: ghcr.io/superblocksteam/ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
      tag: 0.146.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    batch:
      sendBatchSize: 512
      sendBatchMaxSize: 2048
    prometheusRemoteWrite:
      timeout: 30s
      tlsInsecure: true
      remoteWriteQueue:
        enabled: true
        queueSize: 4096
        numConsumers: 5
    # Batch flush interval before forwarding OTLP metrics to Prometheus remote-write.
    # Lower = fresher sandbox_execution_pool_in_use for KEDA (more frequent writes).
    batchTimeout: 5s
  prometheus:
    image:
      repository: ghcr.io/superblocksteam/prom/prometheus
      tag: v3.4.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
  # When prometheusServerAddress is "auto": optional node placement for the in-chart OTel
  # collector and Prometheus Deployments.
  metricsInfra:
    nodeSelector: {}
    tolerations: []
  maxReplicaCount: 100
  minReplicaCount: 0
  # Scaling triggers - typically Redis stream length
  triggers: []
  # Example:
  # triggers:
  #   - type: redis-streams
  #     metadata:
  #       address: redis:6379
  #       stream: sandbox:work:python
  #       consumerGroup: ephemeral-python
  #       lagCount: "1"
  #       activationLagCount: "1"
# Redis transport configuration
queue:
  deploy: false # Set to true to deploy Redis as a subchart (for local/CI testing)
  tls: false
  host: redis
  servername: ""
  port: 6379
  password: ""
  blockDuration: 5s
  batchSize: 10
  executionPool: 100
  pool:
    min: 5
    max: 10
  timeout:
    dial: 5s
    read: 5m
    write: 10s
    pool: 5m
  degradedMode:
    backoff: 1s
    maxTime: 10m
# Redis kvstore configuration
kvstore:
  deploy: false # Set to true to deploy Redis as a subchart (for local/CI testing)
  tls: false
  host: redis
  servername: ""
  port: 6379
  password: ""
  pool:
    min: 5
    max: 10
  timeout:
    dial: 5s
    read: 5m
    write: 10s
    pool: 5m
# Variable Store gRPC service configuration
variableStore:
  grpc:
    port: 50050
  http:
    port: 8080
# Streaming Proxy gRPC service configuration
streamingProxy:
  grpc:
    port: 50052
# Integration executor configuration
# When enabled, the task-manager runs a gRPC service that allows sandboxed code
# to execute integrations by proxying requests to the orchestrator.
# Requires orchestrator gRPC service to be accessible from task-manager pods.
integrationExecutor:
  enabled: false
  grpc:
    port: 50053
  # Internal gRPC address of the orchestrator (e.g., "orchestrator-grpc:8081").
  # Required when integration executor is enabled.
  orchestratorGrpcAddress: ""
# Worker configuration
worker:
  group: main
  events:
    - execute
  includeStandardStreams: true
# Observability
observability:
  logging:
    level: info
  metrics:
    # OTLP HTTP base for task-manager metrics.
    # When keda.prometheusServerAddress is "auto": task-managers do not use this for export;
    # they send to the in-chart collector instead. In that mode, url (if non-empty) is the
    # collector's optional OTLP fan-out target, and takes precedence over forwardUrl when both
    # are set. When prometheusServerAddress is not "auto", task-managers send OTLP here only.
    url: ""
    # How often task-manager exports OTLP metrics (Kubernetes duration, e.g. 2s, 5s).
    # Lower reduces staleness for KEDA Prometheus queries at the cost of higher OTLP volume.
    # Omit (empty) to use task-manager default (10s).
    exportInterval: ""
    # When keda.prometheusServerAddress is "auto": optional second fan-out target. Used only if
    # url is empty. Ignored when not "auto" (task-managers use url only).
    forwardUrl: ""
  tracing:
    url: ""
telemetry:
  deploymentType: "cloud"
# Superblocks configuration
superblocks:
  key: <override>
  # Platform-managed SSH tunnel private keys (only needed for integration fleets)
  # Leave empty to omit the K8s Secret; set values when externalSecrets.enabled is false.
  tunnelPrivateKeyRSA: ""
  tunnelPrivateKeyEd25519: ""
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: "aws-secrets-manager"
    kind: "ClusterSecretStore"
  # Configure remote refs for each secret when externalSecrets.enabled is true.
  # Set remoteRef.key to the AWS Secrets Manager path for each value.
  agentKey:
    data:
      - secretKey: key
        remoteRef:
          key: ""
  queueRedis:
    data:
      - secretKey: token
        remoteRef:
          key: ""
  kvstoreRedis:
    data:
      - secretKey: token
        remoteRef:
          key: ""
# Pod configuration
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
podAnnotations: {}
# Network isolation configuration
# Blocks sandbox from accessing internal infrastructure via iptables
network:
  # CIDRs treated as internal by network policy rules that target VPC-local services.
  internalCIDRs:
    - 10.0.0.0/8
    - 100.64.0.0/10
  # VPC CIDR to block - set this to your cloud VPC range
  # Leave empty to block ALL RFC 1918 private ranges (10.x, 172.16.x, 192.168.x)
  vpcCIDR: ""
  # External HTTPS/gRPC callback ports that task-manager can egress to.
  # Keep this list minimal; override per environment when needed.
  taskManagerAllowedExternalPorts:
    - 443
  # Kubernetes service CIDR (blocks access to k8s services)
  serviceCIDR: ""
  # Additional CIDRs to block (list)
  additionalBlockedCIDRs: []
  # Additional CIDRs to allow (list) - for customer internal APIs that should be accessible
  # These CIDRs will be explicitly allowed even if they fall within blocked ranges
  additionalAllowedCIDRs: []
# gVisor runtime class name (if using gVisor for sandbox isolation)
# Set this to your gVisor RuntimeClass name (e.g., "gvisor", "runsc")
runtimeClassName: ""
# Image pull secrets
image:
  credentials:
    registry: ghcr.io
    username: '<override>'
    password: '<override>'
