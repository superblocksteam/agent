---
# Local testing configuration: Redis at host.docker.internal.
# Task managers run as Deployments with KEDA ScaledObject autoscaling.
#
# KEDA redis-streams triggers are generated from fleet.streams (same keys as
# --worker.stream.keys). Redis authenticationRef is wired chart-wide from
# queue.password via templates/trigger-auth.yaml (<fullname>-redis-trigger-auth);
# no per-fleet keda.triggers needed for stream scaling.
fleets:
  # Python ephemeral worker fleet
  python-ba:
    language: python
    bucket: BA
    consumerGroup: ephemeral-python
    streams:
      - agent.main.bucket.BA.ephemeral.plugin.python.event.execute
      - agent.main.bucket.BE.ephemeral.plugin.python.event.execute
      - agent.main.bucket.B1.ephemeral.plugin.python.event.execute
      - agent.main.bucket.B2.ephemeral.plugin.python.event.execute
    keda:
      pollingInterval: 1
      minReplicaCount: 1
      maxReplicaCount: 5
  # JavaScript ephemeral worker fleet
  javascript-ba:
    language: javascript
    bucket: BA
    consumerGroup: ephemeral-javascript
    streams:
      - agent.main.bucket.BA.ephemeral.plugin.javascript.event.execute
      - agent.main.bucket.BE.ephemeral.plugin.javascript.event.execute
      - agent.main.bucket.B1.ephemeral.plugin.javascript.event.execute
      - agent.main.bucket.B2.ephemeral.plugin.javascript.event.execute
    keda:
      pollingInterval: 1
      minReplicaCount: 1
      maxReplicaCount: 5
# Task Manager image
taskManager:
  image:
    repository: ghcr.io/superblocksteam/task-manager
    tag: latest
    pullPolicy: IfNotPresent
# Sandbox images
sandbox:
  python:
    image:
      repository: ghcr.io/superblocksteam/python-sandbox
      tag: latest
      pullPolicy: IfNotPresent
  javascript:
    image:
      repository: ghcr.io/superblocksteam/javascript-sandbox
      tag: latest
      pullPolicy: IfNotPresent
# Redis configuration - Docker Redis uses "koala" password
queue:
  host: host.docker.internal
  port: 6379
  tls: false
  password: koala
kvstore:
  host: host.docker.internal
  port: 6379
  tls: false
  password: koala
# Disable resource limits for local testing
nodeSelector: null
tolerations: null
affinity: null
# No image pull secrets for local images
imagePullSecrets: []
# Superblocks configuration
superblocks:
  key: dev-agent-key
# Fullname override for sandbox workers
fullnameOverride: sandbox-workers
