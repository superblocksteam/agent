---
# CI environment configuration for ephemeral workers in Kind
# Uses KEDA ScaledJob to process Redis stream messages
externalSecrets:
  enabled: false
fleets:
  # Integration fleet: handles non-code plugins (postgres, restapi, s3, etc.)
  integration-javascript:
    language: javascript
    consumerGroup: sandbox-integration
    ephemeral: false
    plugins:
      - postgres
    buckets:
      - BA
      - BE
    events:
      - execute
    taskManager:
      extraEnv:
        - name: SUPERBLOCKS_TUNNEL_PRIVATE_KEY_RSA
          valueFrom:
            secretKeyRef:
              name: sandbox-workers-tunnel-private-key-rsa
              key: key
              optional: true
        - name: SUPERBLOCKS_WORKER_EXECUTION_ENV_INCLUSION_LIST
          value: "SUPERBLOCKS_TUNNEL_PRIVATE_KEY_RSA"
    keda:
      pollingInterval: 1
      minReplicaCount: 1
      maxReplicaCount: 3
      triggers:
        - type: redis-streams
          metadata:
            address: redis-master.superblocks.svc.cluster.local:6379
            stream: agent.main.bucket.BA.plugin.postgres.event.execute
            consumerGroup: sandbox-integration
            lagCount: "1"
          authenticationRef:
            name: sandbox-workers-redis-trigger-auth
  # Python ephemeral worker fleet
  python-ba:
    language: python
    bucket: BA
    consumerGroup: ephemeral-python
    plugins:
      - python
    buckets:
      - BA
      - BE
      - B1
      - B2
    events:
      - execute
    keda:
      pollingInterval: 1
      minReplicaCount: 1
      maxReplicaCount: 5
      triggers:
        - type: redis-streams
          metadata:
            address: redis-master.superblocks.svc.cluster.local:6379
            stream: agent.main.bucket.BA.plugin.python.event.execute
            consumerGroup: ephemeral-python
            lagCount: "1"
          authenticationRef:
            name: sandbox-workers-redis-trigger-auth
  # JavaScript ephemeral worker fleet
  javascript-ba:
    language: javascript
    bucket: BA
    consumerGroup: ephemeral-javascript
    plugins:
      - javascript
      - javascriptwasm
    buckets:
      - BA
      - BE
      - B1
      - B2
    events:
      - execute
    keda:
      pollingInterval: 1
      minReplicaCount: 1
      maxReplicaCount: 5
      triggers:
        - type: redis-streams
          metadata:
            address: redis-master.superblocks.svc.cluster.local:6379
            stream: agent.main.bucket.BA.plugin.javascript.event.execute
            consumerGroup: ephemeral-javascript
            lagCount: "1"
          authenticationRef:
            name: sandbox-workers-redis-trigger-auth
        - type: redis-streams
          metadata:
            address: redis-master.superblocks.svc.cluster.local:6379
            stream: agent.main.bucket.BA.plugin.javascriptwasm.event.execute
            consumerGroup: ephemeral-javascript
            lagCount: "1"
          authenticationRef:
            name: sandbox-workers-redis-trigger-auth
# Task Manager image (built in CI)
taskManager:
  # Expose a stable Service so e2e tests can reach the HTTP gateway via DNS
  # without relying on dynamic pod IPs. Disabled in production.
  service:
    enabled: true
  image:
    repository: ghcr.io/superblocksteam/task-manager
    pullPolicy: IfNotPresent
# Sandbox images
sandbox:
  python:
    image:
      repository: ghcr.io/superblocksteam/python-sandbox
      pullPolicy: IfNotPresent
  javascript:
    image:
      repository: ghcr.io/superblocksteam/javascript-sandbox
      pullPolicy: IfNotPresent
# Redis configuration - use Bitnami Redis deployed to Kind
queue:
  deploy: false
  host: redis-master.superblocks.svc.cluster.local
  port: 6379
  tls: false
  password: koala
kvstore:
  host: redis-master.superblocks.svc.cluster.local
  port: 6379
  tls: false
  password: koala
# Disable resource limits for CI
nodeSelector: null
tolerations: null
affinity: null
# Image pull secrets (use default for CI)
imagePullSecrets: []
# Superblocks configuration for CI
superblocks:
  key: dev-agent-key
# Fullname override for sandbox workers
fullnameOverride: sandbox-workers
