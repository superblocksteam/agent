# Trivy ignore file for the orchestrator — curated suppressions for crit/high findings.
#
# POLICY (do not strip — encodes why these are accepted, not just that they are):
#   - Each entry suppresses a finding that is either (a) not reachable / inert in our
#     deployment, (b) has no upstream fix, or (c) is a deferred bump tracked to a ticket.
#   - `expired_at` marks time-boxed suppressions (a fix exists or is expected); entries
#     WITHOUT it are permanent accepts (no upstream fix, e.g. Debian no-dsa OS packages).
#   - OS/distro packages are scoped with `paths: []` (global by CVE id) or `purls:` —
#     Trivy's `paths` matches image-root-relative FILE paths, which OS packages lack.
#     Do NOT scope OS-package entries by image name; it silently matches nothing.
#   - Compensating-control rationales (e.g. ephemeral gVisor sandbox pods) apply ONLY to
#     the user-step execution paths, NOT to libraries linked into long-lived
#     agent/orchestrator processes. State both surfaces honestly.
#   - vm2-class sandbox-escape suppressions are NOT auto-accepted for future CVEs: a new
#     vm2 CVE must be re-evaluated against the current compensating controls before reuse.
vulnerabilities:
  - id: CVE-2025-14874
    paths:
      - '**/node_modules/.pnpm/nodemailer@6.9.9/node_modules/nodemailer/**'
    statement: nodemailer DoS via crafted email address header; fix requires 7.0.11 (major version bump from 6.x); smtp plugin upgrade to nodemailer@9.0.1 in progress
    expired_at: '2026-09-24T00:00:00Z'
