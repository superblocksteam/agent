---
vulnerabilities:
  # vm2 sandbox-escape findings — risk accepted on compensating controls (NOT vm2's own
  # sandboxing): each user JS step/API runs in its own ephemeral, single-use pod that is
  # terminated immediately after one execution, under gVisor, network-isolated with no
  # access to the internal network. (Cloud Prem deploys the vm2 execute paths
  # main.ephemeral.javascript.execute / .javascriptsdkapi.execute with ephemeral: true;
  # only the non-vm2 WASM/QuickJS paths run pooled.)
  # A fix (vm2 3.11.5) is available and rolling out in the next release via orchestrator
  # PR #2675, so these are time-boxed (expired_at) to that rollout — extend if the customer
  # has not upgraded by then. vm2 itself stays (coexists with the WASM/QuickJS sandbox); a
  # future vm2 CVE should reuse this rationale only after confirming the same controls apply
  # to that vulnerability class — it is not auto-accepted.
  - id: CVE-2026-24118
    paths:
      - "**/node_modules/vm2/**"
    statement: "vm2 sandbox-escape risk accepted via compensating controls: each user JS step/API runs in its own ephemeral, single-use pod terminated immediately after one execution, gVisor-sandboxed and network-isolated with no access to the internal network. Fix (vm2 3.11.5) available and rolling out in the next release; suppression expires once that ships"
    expired_at: "2026-06-12T00:00:00Z"
