  # form-data 2.5.1 — inert artifact pulled in only via the types-only chain
  # snowflake-sdk > @google-cloud/storage > retry-request > @types/request (types-only) > form-data@2.5.1.
  # Runtime importers resolve patched form-data@4.0.5; path-scoped to the inert 2.5.1 copy.
  - id: CVE-2025-7783
    paths:
      - "**/node_modules/.pnpm/form-data@2.5.1/node_modules/form-data/**"
    statement: "inert form-data@2.5.1 via snowflake-sdk > @google-cloud/storage > retry-request > @types/request (types-only); runtime importers resolve patched form-data@4.0.5"
