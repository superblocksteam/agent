  - id: CVE-2020-36604
    paths:
      - app/node_modules/.pnpm/hoek@4.3.1/node_modules/hoek/package.json
      - app/node_modules/.pnpm/hoek@5.0.4/node_modules/hoek/package.json
      - app/node_modules/.pnpm/hoek@6.1.3/node_modules/hoek/package.json
      - app/sandbox-js/node_modules/.pnpm/hoek@4.3.1/node_modules/hoek/package.json
    statement: 'hoek 4-6.x is pulled in solely by xml2json@0.12.0 (and its transitive joi@13.7.0 and topo@3.0.3). The vulnerable Hoek.clone function is never called with user-supplied data: xml2json uses hoek only for hoek.assert() (a boolean throw-if-false guard, no clone); joi.validate() calls Hoek.clone only on its own static internal schema flags and on _flags.default values (all primitives: false/true) which hoek.clone returns immediately without processing. No code path from user-controlled xml2json options or XML input reaches Hoek.clone. The legacy hoek 4-6.x line has no upstream fix; the fix exists only in the renamed @hapi/hoek package (>=8.5.1), requiring xml2json replacement. Migration to an alternative is tracked as a future effort.'
  - id: CVE-2025-69720
    paths: []
    statement: "CVE-2025-69720 is a stack-based buffer overflow exclusively in the infocmp CLI tool (progs/infocmp.c) from ncurses-bin. The ncurses-bin package has been removed from both agent and python-sandbox Dockerfiles (no reverse dependencies; zero runtime use). The remaining flagged packages libncursesw6, libtinfo6, and ncurses-base are runtime libraries that contain no vulnerable code — Trivy flags them due to shared Debian source package. Debian trixie is tagged no-dsa (minor issue, crash in CLI tool); no fix available for trixie. This suppression covers only the over-flagged runtime library packages after ncurses-bin removal."
    expired_at: '2026-12-01T00:00:00Z'
  - id: CVE-2026-5773
    paths: []
    statement: 'curl 8.14.1-2+deb13u3 is present in the agent image as a build-time residual from apt-repo setup in the final Dockerfile RUN layer. No patched version exists in Debian trixie (fixed only in forky/sid at 8.20.0+; Debian rates this no-dsa/minor). The curl binary is not invoked at runtime: no s6 service script, no HEALTHCHECK, and no Go/Python application code execs curl (confirmed by code search). CVE-2026-5773 exploits wrong SMB connection reuse -- an attack path that requires the agent process to make sequential SMB transfers to different shares, which never occurs in this deployment.'
  - id: CVE-2026-7598
    paths: []
    statement: "libssh2-1t64 (Debian trixie, no upstream fix) is present wherever curl/libcurl4t64 is installed — the agent and agent-slim runtime images (apt-get install curl). Not reachable: orchestrator code never invokes libssh2 SCP/SFTP (curl is used for HTTP only). Global scope (paths: []) intended — covers every image carrying the package."
  - id: CVE-2025-59375
    paths: []
    statement: "libexpat1 (Debian trixie, no upstream fix). Two XML-parsing surfaces: (a) customer Python/JS steps in the python-sandbox/javascript-sandbox images run in ephemeral single-use gVisor-isolated, network-isolated pods terminated after one execution; (b) first-party XML in the long-lived agent/orchestrator processes (via lxml, xml2json) is NOT covered by that control. Risk ACCEPTED and TIME-BOXED on (b) pending a Debian fix — re-review at expiry and bump the base image once trixie ships a patch. (Signed off.)"
    expired_at: '2026-09-12T00:00:00Z'
