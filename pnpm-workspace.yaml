---
injectWorkspacePackages: true
packages:
  - 'workers/javascript/packages/**'
  - 'workers/javascript/packages/quickjs-emscripten/packages/**'
  - 'workers/ephemeral/javascript-plugins-sandbox'
  - 'clients/typescript'
  - 'mocks'
  - 'types/gen/js'
overrides:
  vm2: ">=3.11.5 <4"
  "@smithy/config-resolver": "^4.4.0"
  qs: ">=6.15.2 <7"
  protobufjs: "^7.5.8"
  node-forge: "^1.4.0"
  fast-xml-parser: "^4.5.6"
  axios: ">=1.16.0 <2"
  basic-ftp: ">=5.3.1 <6"
  fast-uri: ">=3.1.2 <4"
  path-to-regexp: ">=0.1.13 <0.2"
  "form-data@<3": ">=2.5.4 <3"
  "js-yaml@<4": ">=3.14.2 <4"
  "glob@>=10 <11": ">=10.5.0 <11"
  "ws@>=8 <9": ">=8.20.1 <9"
  "minimatch@>=3 <4": ">=3.1.4 <4"
  "minimatch@>=5 <6": ">=5.1.8 <6"
  "minimatch@>=9 <10": ">=9.0.7 <10"
  "minimatch@>=10 <11": ">=10.2.3 <11"
  "jws@<4": ">=3.2.3 <4"
  "jws@>=4 <5": ">=4.0.1 <5"
  "brace-expansion@<2": ">=1.1.13 <2"
  "brace-expansion@>=2 <3": ">=2.0.3 <3"
  "bn.js@>=4 <5": ">=4.12.3 <5"
  "bn.js@>=5 <6": ">=5.2.3 <6"
catalog:
  '@jest/globals': '29.7.0'
  '@swc/cli': '0.6.0'
  '@swc/core': '1.7.26'
  '@swc/jest': '0.2.36'
  '@types/google-protobuf': '^3.15.12'
  google-protobuf: '3.21.4'
  '@types/jest': '29.5.12'
  '@types/lodash': '^4.17.0'
  '@types/node': '22.15.3'
  '@typescript-eslint/eslint-plugin': '^7.8.0'
  '@typescript-eslint/parser': '^7.8.0'
  chokidar-cli: '3.0.0'
  dotenv: '16.4.5'
  eslint: '8.57.0'
  eslint-config-prettier: '^10.1.8'
  eslint-import-resolver-typescript: '^2.5.0'
  eslint-plugin-import: '^2.29.1'
  jest: '29.7.0'
  nodemon: '^3.1.4'
  oxfmt: '^0.42.0'
  rimraf: '^5.0.0'
  ts-jest: '^29.2.6'
  ts-node: '^10.9.2'
  typescript: '^5.5.4'
allowBuilds:
  - '@swc/core'
  - aws-sdk
  - bcrypt
  - couchbase
  - cpu-features
  - deasync
  - esbuild
  - grpc-tools
  - lz4
  - nice-napi
  - node-expat
  - oracledb
  - protobufjs
  - ssh2
blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@superblocksteam/sdk-api'
