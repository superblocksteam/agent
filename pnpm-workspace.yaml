---
injectWorkspacePackages: true
packages:
  - 'workers/javascript/packages/**'
  - 'workers/javascript/packages/quickjs-emscripten/packages/**'
  - 'workers/ephemeral/javascript-plugins-sandbox'
  - 'clients/typescript'
  - 'mocks'
  - 'types/gen/js'
overrides:
  "@smithy/config-resolver": "^4.4.0"
  prettier: "3.3.3"
  qs: "^6.14.2"
catalog:
  '@jest/globals': '29.7.0'
  '@swc/cli': '0.6.0'
  '@swc/core': '1.7.26'
  '@swc/jest': '0.2.36'
  '@types/google-protobuf': '^3.15.12'
  google-protobuf: '3.21.4'
  '@types/jest': '29.5.12'
  '@types/lodash': '^4.17.0'
  '@types/node': '20.14.8'
  '@typescript-eslint/eslint-plugin': '^7.8.0'
  '@typescript-eslint/parser': '^7.8.0'
  chokidar-cli: '3.0.0'
  dotenv: '16.4.5'
  eslint: '8.57.0'
  eslint-config-prettier: '8.1.0'
  eslint-import-resolver-typescript: '^2.5.0'
  eslint-plugin-import: '^2.29.1'
  eslint-plugin-prettier: '5.2.1'
  jest: '29.7.0'
  nodemon: '^3.1.4'
  prettier: '3.3.3'
  rimraf: '^5.0.0'
  ts-jest: '^29.2.6'
  ts-node: '^10.9.2'
  typescript: '^5.5.4'
allowBuilds:
  - '@swc/core'
  - aws-sdk
  - bcrypt
  - couchbase
  - cpu-features
  - deasync
  - esbuild
  - grpc-tools
  - lz4
  - nice-napi
  - node-expat
  - oracledb
  - protobufjs
  - ssh2
blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@superblocksteam/sdk-api'
