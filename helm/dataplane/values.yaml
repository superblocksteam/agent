---
server:
  # Enables in-process CORS for every origin, including credentials and private network requests.
  # Use only for local development. Configure ingress.cors for restricted production CORS.
  handleCors: false
superblocks:
  url: 'https://api.superblocks.com'
  agentTags: ''
autoscaling:
  disable: false
  min: 5
  max: 50
  cpu: 50
podDisruptionBudget:
  disable: false
auth:
  jwt:
    jwks_url: 'https://prod-cdn.superblocks.com/.well-known/jwks.json'
ingress:
  opa:
    enabled: false
  dns: false
  disable: false
  certificate:
    disable: false
  host: <override>
  cors:
    # Can support multiple origins, comma separated
    # For example: 'https://app.superblocks.com, https://app.superblockshq.com'
    allowOrigin: '<override>'
    age: 1728000
    methods:
      - GET
      - PUT
      - POST
      - DELETE
      - PATCH
      - OPTIONS
    headers:
      - x-superblocks-request-id
      - DNT
      - Keep-Alive
      - User-Agent
      - X-Requested-With
      - If-Modified-Since
      - Cache-Control
      - Content-Type
      - Range
      - Authorization
      - X-Superblocks-Authorization
      - X-Superblocks-Data-Domain
      - traceparent
      - tracestate
      - baggage
      - x-datadog-origin
      - x-datadog-parent-id
      - x-datadog-sampling-priority
      - x-datadog-trace-id
service:
  terminationGracePeriodSeconds: 2700
  grpc:
    maxMsgReq: 100000000
    maxMsgRes: 100000000
  logLevel: info
  ports:
    http: 8080
    grpc: 8081
  tls:
    insecure: false
observability:
  logs:
    intake:
      endpoint: ''
  metadata:
    intake:
      url: 'https://metadata.intake.superblocks.com'
  event:
    intake:
      url: 'https://events.intake.superblocks.com'
  tracing:
    exporter:
      scheme: http
      port: 4318
      path: '/v1/traces'
      host: otelcol-collector.observability.svc.cluster.local
resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 150m
    memory: 750Mi
    # Hint to the scheduler about local scratch usage; should exceed tmpSizeLimit.
    ephemeral-storage: 2048Mi
# Size limit for the /tmp emptyDir (writable scratch under a read-only root fs).
tmpSizeLimit: 2048Mi
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true
  runAsGroup: 1001
  runAsUser: 1001
kvstore:
  host: '<override>'
  servername: ''
  enable_tls: true
  pool:
    fast:
      min: 10
      max: 50
    slow:
      min: 10
      max: 50
  timeout:
    dial: 20s
queue:
  deploy: false
  host: '<override>'
  servername: ''
  enable_tls: true
  pool:
    min: 10
    max: 50
  timeout:
    dial: 20s
image:
  orchestrator:
    repository: ghcr.io/superblocksteam/orchestrator
    tag: latest
    pullPolicy: IfNotPresent
bindings:
  # Enable WASM sandbox for bindings evaluation.
  # LaunchDarkly takes priority when configured; this is used as fallback.
  wasmSandboxEnabled: true
pureJs:
  # Enable WASM sandbox for pure JS step execution.
  # LaunchDarkly takes priority when configured; this is used as fallback.
  wasmSandboxEnabled: true
networkpolicy:
  disable: false
events:
  cloud:
    enabled: false
extraEnv: {}
# Feature flags ConfigMap - when set, mounts an external flags file instead of using the baked-in flags.json.
# The ConfigMap should contain a flagValues key-value format compatible with LaunchDarkly file data source.
# Example: featureFlags:
#            configMapName: feature-flags
#            fileName: feature-flags.json
featureFlags: {}
gateway:
  gatewayRefs:
    - name: internal-gateway
      namespace: kong-ingress-controller
  maxBodySize: 500
  timeouts:
    request: 10m
    backendRequest: 10m
# Sandbox workers (KEDA ScaledJobs): Redis streams → task-manager → pool of sandboxes.
sandbox_workers:
  postgres:
    # Serialized to a JSON array in the environment. Entries are exact role ARNs,
    # or role-path prefixes ending in "/". Empty denies all IAM roles.
    iamAllowedRoleArnPrefixes: []
  # Fleets configuration - each fleet is a Deployment + KEDA ScaledObject
  # Example:
  # fleets:
  #   main.ephemeral.javascriptsdkapi.execute:
  #     language: javascript
  #     consumerGroup: main-sandbox-ephemeral
  #     ephemeral: true
  #     queue:
  #       executionPool: 2
  #     plugins:
  #       - javascriptsdkapi
  #     events:
  #       - execute
  #       - metadata
  #       - test
  #       - pre_delete
  #     buckets:
  #       - BA
  #       - BE
  #     sandbox:
  #       poolSize: 3
  #     keda:
  #       pollingInterval: 1
  #       minReplicaCount: 15
  #       maxReplicaCount: 200
  fleets: {}
  # Task Manager configuration
  taskManager:
    image:
      repository: ghcr.io/superblocksteam/task-manager
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 200m
        memory: 128Mi
    # Additional args to pass to the task-manager
    extraArgs: []
    # Port of the worker-owned health HTTP server (serves /startupz, /readyz, /healthz).
    healthPort: 8090
    # Startup probe — /startupz turns 200 once the sandbox pool is warm.
    startupProbe:
      httpGet:
        path: /startupz
        port: health
      periodSeconds: 2
      timeoutSeconds: 2
      failureThreshold: 150 # Up to ~300s for the pool to warm on cold start (150 * 2s)
    # Readiness probe — /readyz is 200 when Redis is reachable and the pool is warm.
    readinessProbe:
      httpGet:
        path: /readyz
        port: health
      periodSeconds: 5
      timeoutSeconds: 2
      failureThreshold: 3
    # Liveness probe — /healthz tracks only the health-loop heartbeat, never
    # dependency reachability, so a Redis/pool blip can't kill a healthy pod.
    livenessProbe:
      httpGet:
        path: /healthz
        port: health
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    shutdown:
      terminationGracePeriodSeconds: 600 # 10 minutes
      # Base delay before, after receiving a termination signal, before draining the worker.
      delay: 1m
      # Maximum jitter to add to the base delay.
      maxJitter: 5m
    tmpSizeLimit: 256Mi
    podSecurityContext:
      fsGroup: 65532
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 65532
      runAsNonRoot: true
      runAsUser: 65532
  # Sandbox configurations (per language)
  sandbox:
    # Default gRPC port for sandbox pods (used in NetworkPolicy)
    port: 50051
    # Number of sandbox Jobs per task-manager pod (override per fleet with fleets.<name>.sandbox.poolSize)
    poolSize: 5
    # Maximum time sandbox pods may drain in-flight requests after receiving a SIGTERM/SIGINT.
    gracefulShutdownTimeout: 10m
    # Runtime class for sandbox pods (e.g., gvisor for secure isolation)
    # Falls back to global runtimeClassName if not set
    runtimeClassName: gvisor
    # Annotations to add to sandbox pod templates.
    # Can be overridden per-language (sandbox.python.podAnnotations) or per-fleet (fleets.<name>.sandbox.podAnnotations).
    # Merging order (later takes precedence): global sandbox.podAnnotations < language < fleet.
    podAnnotations: {}
    python:
      image:
        repository: ghcr.io/superblocksteam/python-sandbox
        tag: latest
        pullPolicy: IfNotPresent
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 256Mi
      port: 50051
      # Additional args/env for the python sandbox
      extraEnv: []
    javascript:
      image:
        repository: ghcr.io/superblocksteam/javascript-sandbox
        tag: latest
        pullPolicy: IfNotPresent
      resources:
        limits:
          memory: 4Gi
        requests:
          cpu: 300m
          memory: 700Mi
      port: 50051
      # Additional args/env for the javascript sandbox
      extraEnv: []
  # Sandbox Job configuration
  # Task-manager creates and manages the lifecycle of sandboxes
  # In ephemeral mode, the task-manager will dynamically create a new sandbox Job for each execution
  sandboxJob:
    # Auto-delete Job after completion (success or failure)
    ttlSecondsAfterFinished: 0
  # KEDA ScaledJob defaults (fleets may override via fleets.<name>.keda)
  keda:
    pollingInterval: 5
    cooldownPeriod: 300
    # Prometheus HTTP API base URL for KEDA's prometheus scaler (PromQL).
    # - "auto": deploy in-chart OTel Collector + Prometheus. Task-managers send OTLP to that
    #   collector (not to observability.metrics.url). Optional fan-out from the collector uses
    #   observability.metrics.url first, then observability.metrics.forwardUrl if url is empty
    #   (see observability.metrics).
    # - Any other non-empty URL: KEDA queries that Prometheus (or compatible) instance; task-managers
    #   send OTLP to observability.metrics.url only.
    prometheusServerAddress: auto
    # When prometheusServerAddress is "auto", Calico policies restrict who can reach the in-chart
    # OTel collector (OTLP) and Prometheus (:9090 remote-write + PromQL). Must list every
    # namespace that runs KEDA components that query Prometheus (often "keda"; some installs use
    # "keda-system").
    prometheusQueryClientNamespaces:
      - keda
    # Container images for in-chart components (override for mirroring or air-gapped registries).
    collector:
      image:
        repository: ghcr.io/superblocksteam/ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib
        tag: 0.146.0
        pullPolicy: IfNotPresent
      podSecurityContext:
        fsGroup: 10001
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        readOnlyRootFilesystem: true
        runAsGroup: 10001
        runAsUser: 10001
      tmpSizeLimit: 64Mi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi
      batch:
        sendBatchSize: 512
        sendBatchMaxSize: 2048
      prometheusRemoteWrite:
        timeout: 30s
        tlsInsecure: true
        remoteWriteQueue:
          enabled: true
          queueSize: 4096
          numConsumers: 5
      # Batch flush interval before forwarding OTLP metrics to Prometheus remote-write.
      # Lower = fresher sandbox_execution_pool_in_use for KEDA (more frequent writes).
      batchTimeout: 5s
    prometheus:
      image:
        repository: ghcr.io/superblocksteam/prom/prometheus
        tag: v3.4.0
        pullPolicy: IfNotPresent
      # This should be kept in sync with limits
      tsdbSizeLimit: 512Mi
      podSecurityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        privileged: false
        readOnlyRootFilesystem: true
        runAsGroup: 65534
        runAsUser: 65534
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 250m
          memory: 1Gi
    # When prometheusServerAddress is "auto": optional node placement for the in-chart OTel
    # collector and Prometheus Deployments.
    metricsInfra:
      nodeSelector: {}
      tolerations: []
    maxReplicaCount: 100
    minReplicaCount: 0
    # Dataplane chart: scale as soon as there is backlog per trigger
    lagCount: '1'
    # Scaling triggers - typically Redis stream length
    triggers: []
    # Example:
    # triggers:
    #   - type: redis-streams
    #     metadata:
    #       address: redis:6379
    #       stream: sandbox:work:python
    #       consumerGroup: ephemeral-python
    #       lagCount: "1"
    #       activationLagCount: "1"
  # Redis transport configuration
  queue:
    tls: true
    host: "<override>"
    servername: ""
    port: 6379
    password: "<override>"
    blockDuration: 5s
    batchSize: 2
    executionPool: 50
    pool:
      min: 10
      max: 50
    timeout:
      dial: 20s
      read: 5m
      write: 10s
      pool: 5m
    degradedMode:
      backoff: 1s
      maxTime: 10m
  # Redis kvstore configuration
  kvstore:
    tls: true
    host: "<override>"
    servername: ""
    port: 6379
    password: "<override>"
    pool:
      min: 10
      max: 50
    timeout:
      dial: 20s
      read: 5m
      write: 10s
      pool: 5m
  # Variable Store gRPC/HTTP service configuration
  variableStore:
    grpc:
      port: 50050
    http:
      port: 8080
  # Streaming proxy gRPC service configuration
  streamingProxy:
    grpc:
      port: 50052
  # Integration executor configuration
  # When enabled, the task-manager runs a gRPC service that allows sandboxed code
  # to execute integrations by proxying requests to the orchestrator.
  # Requires orchestrator gRPC service to be accessible from task-manager pods.
  integrationExecutor:
    enabled: true
    grpc:
      port: 50053
    # Internal gRPC address of the orchestrator (e.g., "orchestrator-grpc:8081").
    # When empty, defaults to <orchestrator.fullname>-grpc:<service.ports.grpc>.
    orchestratorGrpcAddress: ""
  # Worker configuration
  worker:
    group: main
    events:
      - execute
    # When generating stream keys (no worker.stream.keys override), include standard
    # keys (agent.<group>.bucket.<bucket>.plugin.<plugin>.event.<event>).
    includeStandardStreams: true
    # Optional stream variants combined with standard keys when includeStandardStreams is true
    # streamVariants:
    #   - ephemeral
  # Observability
  observability:
    logging:
      level: info
      url: https://logs.intake.superblocks.com
      enabled: true
    metrics:
      url: http://otelcol-collector.observability.svc.cluster.local:4318
      exportInterval: 5s
    tracing:
      url: http://otelcol-collector.observability.svc.cluster.local:4318
  # Passed to task-manager as --telemetry.deployment.type
  telemetry:
    deploymentType: "cloud-prem"
  # Pod scheduling for task-manager pods (ScaledJob template)
  nodeSelector:
    superblocks.com/node-type: gvisor
  tolerations:
    - effect: NoSchedule
      key: dedicated
      value: gvisor
      operator: Equal
  affinity: {}
  # Spread task-manager pods across zones / nodes when supported by the cluster
  topologySpreadConstraints:
    - maxSkew: 5
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          role: task-manager
    - maxSkew: 5
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          role: task-manager
  podAnnotations: {}
  # Superblocks agent key (when set, mounts SUPERBLOCKS_WORKER_SANDBOX_SUPERBLOCKS_KEY from dataplane-superblocks-key)
  superblocks:
    key: "<override>"
  # Network isolation configuration
  # Blocks sandbox from accessing internal infrastructure via iptables / policy helpers in templates
  network:
    # CIDRs treated as internal by network policy rules that target VPC-local services.
    internalCIDRs:
      - 10.0.0.0/8
      - 100.64.0.0/10
    # VPC CIDR to block - set this to your cloud VPC range
    # Leave empty to block ALL RFC 1918 private ranges (10.x, 172.16.x, 192.168.x)
    vpcCIDR: ""
    # External HTTPS/gRPC callback ports that task-manager can egress to.
    # Keep this list minimal; override per environment when needed.
    taskManagerAllowedExternalPorts: []
    # Kubernetes service CIDR (blocks access to k8s services)
    serviceCIDR: ""
    # Additional CIDRs to block (list)
    additionalBlockedCIDRs: []
    # Additional CIDRs to allow (list) - for customer internal APIs that should be accessible
    # These CIDRs will be explicitly allowed even if they fall within blocked ranges
    additionalAllowedCIDRs: []
  # Default RuntimeClass for sandbox workers (e.g. gvisor / runsc)
  runtimeClassName: gvisor
  # Image pull secrets for task-manager / sandbox images (registry in credentials)
  image:
    credentials:
      registry: ghcr.io
      username: "<override>"
      password: "<override>"
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: "aws-secrets-manager"
    kind: "ClusterSecretStore"
  # Configure remote refs for each secret when externalSecrets.enabled is true.
  # Set remoteRef.key to the AWS Secrets Manager path for each value.
  superblocksKey:
    data:
      - secretKey: key
        remoteRef:
          key: ""
  secretsEncryption:
    data:
      - secretKey: key
        remoteRef:
          key: ""
  queueRedis:
    data:
      - secretKey: token
        remoteRef:
          key: ""
  kvstoreRedis:
    data:
      - secretKey: token
        remoteRef:
          key: ""
  agentKey:
    data:
      - secretKey: key
        remoteRef:
          key: ""
