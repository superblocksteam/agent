---
superblocks:
  url: 'https://api.superblocks.com'
autoscaling:
  disable: false
  min: 5
  max: 50
  cpu: 50
podDisruptionBudget:
  disable: false
auth:
  jwt:
    jwks_url: 'https://prod-cdn.superblocks.com/.well-known/jwks.json'
ingress:
  opa:
    enabled: false
  dns: false
  disable: false
  certificate:
    disable: false
  host: <override>
  cors:
    # Can support multiple origins, comma separated
    # For example: 'https://app.superblocks.com, https://app.superblockshq.com'
    allowOrigin: '<override>'
    age: 1728000
    methods:
      - GET
      - PUT
      - POST
      - DELETE
      - PATCH
      - OPTIONS
    headers:
      - x-superblocks-request-id
      - DNT
      - Keep-Alive
      - User-Agent
      - X-Requested-With
      - If-Modified-Since
      - Cache-Control
      - Content-Type
      - Range
      - Authorization
      - X-Superblocks-Authorization
      - X-Superblocks-Data-Domain
service:
  terminationGracePeriodSeconds: 2700
  grpc:
    maxMsgReq: 100000000
    maxMsgRes: 100000000
  logLevel: info
  ports:
    http: 8080
    grpc: 8081
  tls:
    insecure: false
observability:
  logs:
    intake:
      endpoint: ''
  metadata:
    intake:
      url: 'https://metadata.intake.superblocks.com'
  event:
    intake:
      url: 'https://events.intake.superblocks.com'
  tracing:
    exporter:
      scheme: http
      port: 4318
      path: '/v1/traces'
      host: otelcol-collector.observability.svc.cluster.local
resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 150m
    memory: 750Mi
kvstore:
  host: '<override>'
  servername: ''
  enable_tls: true
  pool:
    fast:
      min: 10
      max: 50
    slow:
      min: 10
      max: 50
  timeout:
    dial: 20s
queue:
  deploy: false
  host: '<override>'
  servername: ''
  enable_tls: true
  pool:
    min: 10
    max: 50
  timeout:
    dial: 20s
image:
  orchestrator:
    repository: ghcr.io/superblocksteam/orchestrator
    tag: latest
    pullPolicy: IfNotPresent
bindings:
  # Enable WASM sandbox for bindings evaluation.
  # LaunchDarkly takes priority when configured; this is used as fallback.
  wasmSandboxEnabled: true
pureJs:
  # Enable WASM sandbox for pure JS step execution.
  # LaunchDarkly takes priority when configured; this is used as fallback.
  wasmSandboxEnabled: true
networkpolicy:
  disable: false
events:
  cloud:
    enabled: false
extraEnv: {}
gateway:
  gatewayRefs:
    - name: internal-gateway
      namespace: kong-ingress-controller
  maxBodySize: 500
  timeouts:
    request: 10m
    backendRequest: 10m
# Sandbox workers (KEDA ScaledJobs): Redis streams → task-manager → pool of sandboxes.
sandbox_workers:
  fleets:
    main.sandbox.javascript.auxillary:
      language: javascript
      consumerGroup: main-sandbox
      ephemeral: false
      triggerStreams:
        - agent.main.bucket.BA.plugin.mssql.event.execute
        - agent.main.bucket.BE.plugin.mssql.event.execute
        - agent.main.bucket.BA.plugin.mssql.event.metadata
        - agent.main.bucket.BA.plugin.mssql.event.test
        - agent.main.bucket.BA.plugin.mssql.event.pre_delete
        - agent.main.bucket.BA.plugin.postgres.event.execute
        - agent.main.bucket.BE.plugin.postgres.event.execute
        - agent.main.bucket.BA.plugin.postgres.event.metadata
        - agent.main.bucket.BA.plugin.postgres.event.test
        - agent.main.bucket.BA.plugin.postgres.event.pre_delete
        - agent.main.bucket.BA.plugin.restapi.event.execute
        - agent.main.bucket.BE.plugin.restapi.event.execute
        - agent.main.bucket.BA.plugin.restapi.event.metadata
        - agent.main.bucket.BA.plugin.restapi.event.test
        - agent.main.bucket.BA.plugin.restapi.event.pre_delete
        - agent.main.bucket.BA.plugin.restapiintegration.event.execute
        - agent.main.bucket.BE.plugin.restapiintegration.event.execute
        - agent.main.bucket.BA.plugin.restapiintegration.event.metadata
        - agent.main.bucket.BA.plugin.restapiintegration.event.test
        - agent.main.bucket.BA.plugin.restapiintegration.event.pre_delete
        - agent.main.bucket.BA.plugin.s3.event.execute
        - agent.main.bucket.BE.plugin.s3.event.execute
        - agent.main.bucket.BA.plugin.s3.event.metadata
        - agent.main.bucket.BA.plugin.s3.event.test
        - agent.main.bucket.BA.plugin.s3.event.pre_delete
      buckets:
        - BA
        - BE
      plugins:
        - "*"
        - "-javascript"
        - "-javascriptwasm"
        - "-javascriptsdkapi"
        - "-python"
      events:
        - execute
        - metadata
        - test
        - pre_delete
      taskManager:
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 400m
            memory: 128Mi
      sandbox:
        resources:
          limits:
            memory: 4Gi
          requests:
            cpu: 600m
            memory: 700Mi
      keda:
        pollingInterval: 1
        minReplicaCount: 5
        maxReplicaCount: 20
      shutdown:
        terminationGracePeriodSeconds: 600
        delay: 4m
        maxJitter: 2m
    main.sandbox.javascriptwasm.execute:
      language: javascript
      consumerGroup: main-sandbox
      ephemeral: false
      triggerStreams:
        - agent.main.bucket.BA.plugin.javascriptwasm.event.execute
        - agent.main.bucket.BE.plugin.javascriptwasm.event.execute
      plugins:
        - javascriptwasm
      events:
        - execute
        - metadata
        - test
        - pre_delete
      buckets:
        - BA
        - BE
      taskManager:
        resources:
          limits:
            memory: 512Mi
          requests:
            cpu: 400m
            memory: 128Mi
      sandbox:
        resources:
          limits:
            memory: 4Gi
          requests:
            cpu: 600m
            memory: 700Mi
      keda:
        pollingInterval: 1
        minReplicaCount: 10
        maxReplicaCount: 20
      shutdown:
        terminationGracePeriodSeconds: 600
        delay: 4m
        maxJitter: 2m
    main.ephemeral.javascript.execute:
      language: javascript
      consumerGroup: main-sandbox-ephemeral
      ephemeral: true
      queue:
        executionPool: 2
      triggerStreams:
        - agent.main.bucket.BA.plugin.javascript.event.execute
        - agent.main.bucket.BE.plugin.javascript.event.execute
      buckets:
        - BA
        - BE
      plugins:
        - javascript
      events:
        - execute
        - metadata
        - test
        - pre_delete
      sandbox:
        poolSize: 3
      keda:
        pollingInterval: 1
        minReplicaCount: 75
        maxReplicaCount: 150
    main.ephemeral.javascriptsdkapi.execute:
      language: javascript
      consumerGroup: main-sandbox-ephemeral
      ephemeral: true
      queue:
        executionPool: 2
      triggerStreams:
        - agent.main.bucket.BA.plugin.javascriptsdkapi.event.execute
        - agent.main.bucket.BE.plugin.javascriptsdkapi.event.execute
      plugins:
        - javascriptsdkapi
      events:
        - execute
        - metadata
        - test
        - pre_delete
      buckets:
        - BA
        - BE
      sandbox:
        poolSize: 3
      keda:
        pollingInterval: 1
        minReplicaCount: 100
        maxReplicaCount: 200
    main.ephemeral.python.execute:
      language: python
      consumerGroup: main-sandbox-ephemeral
      ephemeral: true
      queue:
        executionPool: 2
      triggerStreams:
        - agent.main.bucket.BA.plugin.python.event.execute
        - agent.main.bucket.BE.plugin.python.event.execute
      buckets:
        - BA
        - BE
      plugins:
        - python
      events:
        - execute
        - metadata
        - test
        - pre_delete
      sandbox:
        poolSize: 3
      keda:
        pollingInterval: 1
        minReplicaCount: 150
        maxReplicaCount: 300
  # Task Manager configuration
  taskManager:
    image:
      repository: ghcr.io/superblocksteam/task-manager
      tag: latest
      pullPolicy: IfNotPresent
    resources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    # Additional args to pass to the task-manager
    extraArgs: []
    # Health file path for file-based probes
    healthFilePath: "/tmp/worker_healthy"
    # Set to false to disable all probes (startup, readiness, liveness)
    probesEnabled: false
    # Startup probe — health file exists once Redis and sandbox are ready
    startupProbe:
      exec:
        command:
          - cat
          - "/tmp/worker_healthy"
      failureThreshold: 30 # Allow up to ~60s startup (30 * 2s period)
      periodSeconds: 2
    # Readiness probe — Redis and sandbox reachable
    readinessProbe:
      exec:
        command:
          - cat
          - "/tmp/worker_healthy"
    # Liveness probe — task-manager and sandbox still healthy
    livenessProbe:
      exec:
        command:
          - cat
          - "/tmp/worker_healthy"
    shutdown:
      terminationGracePeriodSeconds: 600 # 10 minutes
      # Base delay before, after receiving a termination signal, before draining the worker.
      delay: 1m
      # Maximum jitter to add to the base delay.
      maxJitter: 5m
  # Sandbox configurations (per language)
  sandbox:
    # Default gRPC port for sandbox pods (used in NetworkPolicy)
    port: 50051
    # Number of sandbox Jobs per task-manager pod (override per fleet with fleets.<name>.sandbox.poolSize)
    poolSize: 5
    # Runtime class for sandbox pods (e.g., gvisor for secure isolation)
    # Falls back to global runtimeClassName if not set
    runtimeClassName: gvisor
    python:
      image:
        repository: ghcr.io/superblocksteam/python-sandbox
        tag: latest
        pullPolicy: IfNotPresent
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 256Mi
      port: 50051
      # Additional args/env for the python sandbox
      extraEnv: []
    javascript:
      image:
        repository: ghcr.io/superblocksteam/javascript-sandbox
        tag: latest
        pullPolicy: IfNotPresent
      resources:
        limits:
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 256Mi
      port: 50051
      # Additional args/env for the javascript sandbox
      extraEnv: []
  # Sandbox Job configuration
  # Task-manager creates and manages the lifecycle of sandboxes
  # In ephemeral mode, the task-manager will dynamically create a new sandbox Job for each execution
  sandboxJob:
    # Auto-delete Job after completion (success or failure)
    ttlSecondsAfterFinished: 0
    # No restart attempts on failure
    backoffLimit: 0
  # KEDA ScaledJob defaults (fleets may override via fleets.<name>.keda)
  keda:
    pollingInterval: 5
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    ttlSecondsAfterFinished: 0 # Auto-cleanup completed task-manager pods after completion
    maxReplicaCount: 100
    minReplicaCount: 0
    # Dataplane chart: scale as soon as there is backlog per trigger
    lagCount: '1'
    # Scaling strategy: "default", "custom", or "accurate"
    # "sum" matches multi-trigger aggregation when used
    scalingStrategy:
      strategy: default
      multipleScalersCalculation: "sum"
    triggers: []
    # Example:
    # triggers:
    #   - type: redis-streams
    #     metadata:
    #       address: redis:6379
    #       stream: sandbox:work:python
    #       consumerGroup: ephemeral-python
    #       lagCount: "1"
    #       activationLagCount: "1"
  # Redis transport configuration
  queue:
    tls: true
    host: "<override>"
    servername: ""
    port: 6379
    password: "<override>"
    blockDuration: 5s
    batchSize: 2
    executionPool: 50
    pool:
      min: 10
      max: 50
    timeout:
      dial: 20s
      read: 5m
      write: 10s
      pool: 5m
    degradedMode:
      backoff: 1s
      maxTime: 10m
  # Redis kvstore configuration
  kvstore:
    tls: true
    host: "<override>"
    servername: ""
    port: 6379
    password: "<override>"
    pool:
      min: 10
      max: 50
    timeout:
      dial: 20s
      read: 5m
      write: 10s
      pool: 5m
  # Variable Store gRPC/HTTP service configuration
  variableStore:
    grpc:
      port: 50050
    http:
      port: 8080
  # Streaming proxy gRPC service configuration
  streamingProxy:
    grpc:
      port: 50052
  # Integration executor configuration
  # When enabled, the task-manager runs a gRPC service that allows sandboxed code
  # to execute integrations by proxying requests to the orchestrator.
  # Requires orchestrator gRPC service to be accessible from task-manager pods.
  integrationExecutor:
    enabled: true
    grpc:
      port: 50053
    # Internal gRPC address of the orchestrator (e.g., "orchestrator-grpc:8081").
    # When empty, defaults to <orchestrator.fullname>-grpc:<service.ports.grpc>.
    orchestratorGrpcAddress: ""
  # Worker configuration
  worker:
    group: main
    events:
      - execute
    # When generating stream keys (no worker.stream.keys override), include standard
    # keys (agent.<group>.bucket.<bucket>.plugin.<plugin>.event.<event>).
    includeStandardStreams: true
    # Optional stream variants combined with standard keys when includeStandardStreams is true
    # streamVariants:
    #   - ephemeral
  # Observability
  observability:
    logging:
      level: info
      url: https://logs.intake.superblocks.com
      enabled: true
    metrics:
      url: http://otelcol-collector.observability.svc.cluster.local:4318
    tracing:
      url: http://otelcol-collector.observability.svc.cluster.local:4318
  # Passed to task-manager as --telemetry.deployment.type
  telemetry:
    deploymentType: "cloud-prem"
  # Pod scheduling for task-manager pods (ScaledJob template)
  nodeSelector:
    superblocks.com/node-type: gvisor
  tolerations:
    - effect: NoSchedule
      key: dedicated
      value: gvisor
      operator: Equal
  affinity: {}
  # Spread task-manager pods across zones / nodes when supported by the cluster
  topologySpreadConstraints:
    - maxSkew: 5
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          role: task-manager
    - maxSkew: 5
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          role: task-manager
  podAnnotations: {}
  # Superblocks agent key (when set, mounts SUPERBLOCKS_WORKER_SANDBOX_SUPERBLOCKS_KEY from dataplane-superblocks-key)
  superblocks:
    key: "<override>"
  # Network isolation configuration
  # Blocks sandbox from accessing internal infrastructure via iptables / policy helpers in templates
  network:
    # CIDRs treated as internal by network policy rules that target VPC-local services.
    internalCIDRs:
      - 10.0.0.0/8
      - 100.64.0.0/10
    # VPC CIDR to block - set this to your cloud VPC range
    # Leave empty to block ALL RFC 1918 private ranges (10.x, 172.16.x, 192.168.x)
    vpcCIDR: ""
    # Kubernetes service CIDR (blocks access to k8s services)
    serviceCIDR: ""
    # Additional CIDRs to block (list)
    additionalBlockedCIDRs: []
    # Additional CIDRs to allow (list) - for customer internal APIs that should be accessible
    # These CIDRs will be explicitly allowed even if they fall within blocked ranges
    additionalAllowedCIDRs: []
  # Default RuntimeClass for sandbox workers (e.g. gvisor / runsc)
  runtimeClassName: gvisor
  # Image pull secrets for task-manager / sandbox images (registry in credentials)
  image:
    credentials:
      registry: ghcr.io
      username: "<override>"
      password: "<override>"
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: "aws-secrets-manager"
    kind: "ClusterSecretStore"
  # Configure remote refs for each secret when externalSecrets.enabled is true.
  # Set remoteRef.key to the AWS Secrets Manager path for each value.
  superblocksKey:
    data:
      - secretKey: key
        remoteRef:
          key: ""
  secretsEncryption:
    data:
      - secretKey: key
        remoteRef:
          key: ""
  queueRedis:
    data:
      - secretKey: token
        remoteRef:
          key: ""
  kvstoreRedis:
    data:
      - secretKey: token
        remoteRef:
          key: ""
  agentKey:
    data:
      - secretKey: key
        remoteRef:
          key: ""
