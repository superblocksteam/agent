{{- range $k, $v := .Values.sandbox_workers.fleets }}
{{- $fleetKeda := $v.keda | default dict }}
{{- /* KEDA 2.20+ rejects a ScaledObject with maxReplicaCount < 1. A lane scaled to max=0 is
       disabled, so skip its ScaledObject entirely; the worker Deployment then runs at its static
       replicas (minReplicaCount, which is 0 for a disabled lane) with no KEDA management.
       This guard covers the disabled-lane (max=0) case only. KEDA also requires
       minReplicaCount < maxReplicaCount for enabled lanes; callers must satisfy that. */}}
{{- $maxReplicas := $.Values.sandbox_workers.keda.maxReplicaCount }}
{{- if hasKey $fleetKeda "maxReplicaCount" }}
{{- $maxReplicas = index $fleetKeda "maxReplicaCount" }}
{{- end }}
{{- if ge ($maxReplicas | int) 1 }}
{{- $minReplicas := $.Values.sandbox_workers.keda.minReplicaCount }}
{{- if hasKey $fleetKeda "minReplicaCount" }}
{{- $minReplicas = index $fleetKeda "minReplicaCount" }}
{{- end }}
{{- $hasTriggers := or (index $fleetKeda "triggers") $.Values.sandbox_workers.keda.triggers }}
{{- $mergeFlag := $.Values.sandbox_workers.keda.triggersMerge | default false }}
{{- if hasKey $fleetKeda "triggersMerge" }}
{{- $mergeFlag = index $fleetKeda "triggersMerge" }}
{{- end }}
{{- $triggersMerge := and $hasTriggers $mergeFlag }}
{{- /* Prometheus warm buffer: minReplicaCount on ScaledObject is the off-hours floor; cron desiredReplicas is the business-hours buffer size. */}}
{{- $promBuffer := $minReplicas }}
{{- range index $fleetKeda "triggers" | default list }}
{{- if eq (index . "type") "cron" }}
{{- with index .metadata "desiredReplicas" }}
{{- $promBuffer = . | int }}
{{- end }}
{{- end }}
{{- end }}
{{- $extraWarm := sub ($promBuffer | int) ($minReplicas | int) }}
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ $k }}
  labels:
    {{- include "sandbox.worker.labels" $v | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $k }}
  pollingInterval: {{ ($v.keda | default dict).pollingInterval | default $.Values.sandbox_workers.keda.pollingInterval }}
  cooldownPeriod: {{ ($v.keda | default dict).cooldownPeriod | default $.Values.sandbox_workers.keda.cooldownPeriod | default 30 }}
  minReplicaCount: {{ $minReplicas }}
  maxReplicaCount: {{ $maxReplicas }}
  {{- if $.Values.sandbox_workers.keda.prometheusServerAddress }}
  fallback:
    failureThreshold: {{ $.Values.sandbox_workers.keda.fallbackFailureThreshold | default 3 }}
    replicas: {{ max 1 (max ($minReplicas | int) ($promBuffer | int)) }}
  {{- end }}
  triggers:
  {{- if $hasTriggers }}
    {{- toYaml (index $fleetKeda "triggers" | default $.Values.sandbox_workers.keda.triggers) | nindent 4 }}
  {{- end }}
  {{- if or (not $hasTriggers) $triggersMerge }}
    {{- range $v.triggerStreams }}
    - type: redis-streams
      metadata:
        host: {{ $.Values.sandbox_workers.queue.host }}
        port: {{ $.Values.sandbox_workers.queue.port | quote }}
        enableTLS: {{ $.Values.sandbox_workers.queue.tls | quote }}
        stream: {{ . }}
        consumerGroup: {{ $v.consumerGroup }}
        {{- with index $fleetKeda "lagCount" | default $.Values.sandbox_workers.keda.lagCount }}
        lagCount: {{ . | quote }}
        {{- end }}
        activationLagCount: {{ index $fleetKeda "activationLagCount" | default $.Values.sandbox_workers.keda.activationLagCount | default "1" | quote }}
      authenticationRef:
        name: redis-trigger-auth
    {{- end }}
    {{- if $.Values.sandbox_workers.keda.prometheusServerAddress }}
    {{- $promAddr := $.Values.sandbox_workers.keda.prometheusServerAddress }}
    {{- if eq $promAddr "auto" }}
    {{- $promAddr = include "sandbox_workers.autoPromQueryUrl" $ | trim }}
    {{- end }}
    {{- $execPoolSize := (($v.queue).executionPool) | default $.Values.sandbox_workers.queue.executionPool | default 1 }}
    # Metrics-based trigger: desired replicas = ceil(in_use / executionPool) + degraded_workers + minReplicaCount + extraWarm when load is high.
    # Each replica serves executionPool concurrent events (requests), so dividing gives the
    # number of fully-occupied workers (task-managers); adding minReplicaCount maintains the warm buffer.
    # worker_degraded_mode (summed by fleet) adds one desired replica per task-manager that cannot admit work.
    #
    # promBuffer is minReplicaCount unless a cron trigger sets desiredReplicas (e.g. business-hours warm capacity).
    # extraWarm (= promBuffer - minReplicaCount) applies only when in_use exceeds the cron warm-pool capacity (extraWarm * executionPool).
    #
    # With no cron (extraWarm=0), this reduces to ceil(in_use / executionPool) + sum(degraded) + minReplicas.
    - type: prometheus
      metricType: AverageValue
      metadata:
        serverAddress: {{ $promAddr }}
        query: ceil((sum(sandbox_execution_pool_in_use{fleet="{{ $k }}"}) or vector(0)) / {{ $execPoolSize }}) + (sum(worker_degraded_mode{fleet="{{ $k }}"}) or vector(0)) + {{ $minReplicas }} + ((sum(sandbox_execution_pool_in_use{fleet="{{ $k }}"}) or vector(0)) >bool {{ mul $extraWarm $execPoolSize }}) * {{ $extraWarm }}
        threshold: "1"
        activationThreshold: "0"
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
