---
x-tolerations: &tolerations
  tolerations:
    - effect: NoSchedule
      key: dedicated
      value: lang-exec-worker
      operator: Equal
x-selector: &selector
  nodeSelector:
    superblocks.com/node-type: lang-exec-worker
server:
  deploy: true
  # Enables in-process CORS for every origin, including credentials and private network requests.
  # Use only for local development. Configure ingress.cors for restricted production CORS.
  handleCors: false
  mock: false
superblocks:
  url: 'https://app.superblocks.com'
  key: <override>
autoscaling:
  disable: false
  min: 5
  max: 50
  cpu: 50
podDisruptionBudget:
  disable: false
auth:
  jwt:
    jwks_url: 'https://prod-cdn.superblocks.com/.well-known/jwks.json'
ingress:
  opa:
    enabled: false
  dns: false
  disable: false
  certificate:
    disable: false
  host: <override>
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: '500m'
    nginx.ingress.kubernetes.io/proxy-buffer-size: '128k'
    nginx.ingress.kubernetes.io/proxy-buffers-number: '8'
    nginx.ingress.kubernetes.io/proxy-connect-timeout: '600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '600'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '600'
  cors:
    # Can support multiple origins, comma separated
    # For example: 'https://app.superblocks.com, https://app.superblockshq.com'
    allowOrigin: '<override>'
    age: 1728000
    methods:
      - GET
      - PUT
      - POST
      - DELETE
      - PATCH
      - OPTIONS
    headers:
      - x-superblocks-request-id
      - DNT
      - Keep-Alive
      - User-Agent
      - X-Requested-With
      - If-Modified-Since
      - Cache-Control
      - Content-Type
      - Range
      - Authorization
      - X-Superblocks-Authorization
      - X-Superblocks-Data-Domain
      - traceparent
      - tracestate
      - baggage
      - x-datadog-origin
      - x-datadog-parent-id
      - x-datadog-sampling-priority
      - x-datadog-trace-id
service:
  terminationGracePeriodSeconds: 2700
  grpc:
    maxMsgReq: 100000000
    maxMsgRes: 100000000
  logLevel: info
  ports:
    http: 8080
    grpc: 8081
telemetry:
  deploymentType: "cloud"
observability:
  logs:
    intake:
      endpoint: ''
  metadata:
    intake:
      url: 'https://metadata.intake.superblocks.com'
  event:
    intake:
      url: 'https://events.intake.superblocks.com'
  tracing:
    exporter:
      scheme: http
      port: 4318
      path: '/v1/traces'
      host: otelcol-collector.observability.svc.cluster.local
resources:
  limits:
    memory: 1Gi
  requests:
    cpu: 150m
    memory: 750Mi
    # Hint to the scheduler about local scratch usage; should exceed tmpSizeLimit.
    ephemeral-storage: 2048Mi
# Size limit for the /tmp emptyDir (writable scratch under a read-only root fs).
tmpSizeLimit: 2048Mi
podSecurityContext:
  fsGroup: 1001
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  privileged: false
  readOnlyRootFilesystem: true
  runAsGroup: 1001
  runAsUser: 1001
kvstore:
  host: '<override>'
  token: '<override>'
  servername: ''
  enable_tls: true
  pool:
    min: 10
    max: 50
  timeout:
    dial: 20s
queue:
  deploy: false
  host: '<override>'
  token: '<override>'
  servername: ''
  enable_tls: true
  pool:
    min: 10
    max: 50
  timeout:
    dial: 20s
image:
  repository: ghcr.io/superblocksteam/orchestrator
  tag: latest
  pullPolicy: IfNotPresent
  credentials:
    registry: ghcr.io
    username: '<override>'
    password: '<override>'
launchdarkly:
  apikey: '<override>'
  # Enable local file-based flags instead of connecting to LaunchDarkly.
  # When true, requires featureFlags.configMapName to be set.
  local: false
# Feature flags ConfigMap - when set with launchdarkly.local=true, mounts an external
# flags file instead of connecting to LaunchDarkly. Useful for local development.
# The ConfigMap should contain a flagValues format compatible with LaunchDarkly file data source.
# Example: featureFlags:
#            configMapName: feature-flags
#            fileName: feature-flags.json
featureFlags: {}
secrets:
  encryptionKey: '<override>'
externalSecrets:
  enabled: false
  refreshInterval: 1h
  secretStoreRef:
    name: "aws-secrets-manager"
    kind: "ClusterSecretStore"
  # Configure remote refs for each secret when externalSecrets.enabled is true.
  # Set remoteRef.key to the AWS Secrets Manager path for each value.
  superblocksKey:
    data:
      - secretKey: key
        remoteRef:
          key: ""
  redis:
    data:
      - secretKey: store
        remoteRef:
          key: ""
      - secretKey: transport
        remoteRef:
          key: ""
  launchdarkly:
    data:
      - secretKey: apikey
        remoteRef:
          key: ""
  secretsEncryption:
    data:
      - secretKey: key
        remoteRef:
          key: ""
bindings:
  # Enable WASM sandbox for bindings evaluation.
  # LaunchDarkly takes priority when configured; this is used as fallback.
  wasmSandboxEnabled: false
pureJs:
  # Enable WASM sandbox for pure JS step execution.
  # LaunchDarkly takes priority when configured; this is used as fallback.
  wasmSandboxEnabled: false
!!merge <<: *tolerations
!!merge <<: *selector
# to be used for local testing only
valkey:
  image:
    registry: ghcr.io/superblocksteam
    repository: docker.io/valkey/valkey
    tag: 8.1.5-alpine
  auth:
    enabled: true
    password: frankbasilgrecojr
  tls:
    authClients: true
  replica:
    replicaCount: 0
networkpolicy:
  disable: true
events:
  cloud:
    enabled: false
extraEnv: {}
# ServiceAccount for the main orchestrator Deployment. Defaults to the
# namespace `default` SA because most environments don't need pod-level AWS
# identity. Set `name` with `create=false` to use an externally managed SA, or
# set `create=true` to let this chart create one. Required when the in-process
# database lifecycle worker is enabled (Terraform state bucket access, RDS
# provisioning, Secrets Manager reads). IRSA wiring (`irsaRoleArn`) is
# provisioned out-of-band; the role's trust policy must allow
# `system:serviceaccount:<namespace>:<saName>` to assume.
# TODO(ENG-3518): `irsaRoleArn` is AWS-specific; fold it into the generic
# `annotations` map or a cloud-scoped key.
serviceAccount:
  create: false
  name: ""
  irsaRoleArn: ""
  annotations: {}
# Native-database lifecycle worker. Off by default. When enabled, the main
# orchestrator process runs the worker as a goroutine alongside the API
# servers; it claims dispatches as the orchestrator's own agent id, so there
# is no separate Deployment, ServiceAccount, or agent id to configure.
databaseLifecycle:
  enabled: false
  # Default rootDir is written via the dedicated `database-lifecycle-work`
  # emptyDir volume mount in the deployment template, so the non-root
  # orchestrator user (UID 1001) can write there without the image needing
  # a world-writable /var/lib path. Override if you supply your own volume.
  rootDir: /var/lib/superblocks/database-lifecycle
  terraformBin: tofu
  pollInterval: 30s
  allowedResourceTypes: []
  allowedModuleSources: []
  # Managed RDS and Aurora use full certificate and hostname verification by
  # default. Override the CA path for private/custom trust roots. Use require
  # only for exceptional intra-VPC sandboxes that cannot validate identity.
  sslMode: verify-full
  sslRootCert: /etc/ssl/certs/aws-rds-global-bundle.pem
  # Allowlist of credential-ref prefixes the worker is permitted to
  # dereference (e.g. "arn:aws:secretsmanager:us-east-1:<account>:secret:rds!db-"
  # to restrict the worker to a single AWS account's RDS-managed secrets).
  # Empty list denies all refs — the worker still starts, but every
  # dispatch carrying credential_refs will fail until an operator
  # populates this. Mirrors SUPERBLOCKS_SECRETS_REFRESOLVER_ALLOWED_REF_PREFIXES
  # in pkg/secrets/refresolver/refresolver.go.
  allowedRefPrefixes: []
gateway:
  gatewayRefs:
    - name: internal-gateway
      namespace: kong-ingress-controller
  maxBodySize: 500
  timeouts:
    request: 10m
    backendRequest: 10m
sandbox_workers:
  deploy: false
  disableNodeSelector: true
  disableTolerations: true
  postgres:
    # Serialized to a JSON array in the environment. Entries are exact role ARNs,
    # or role-path prefixes ending in "/". Empty denies all IAM roles.
    iamAllowedRoleArnPrefixes: []
    # Reserved role for managed Native DB runtime connections. Empty disables
    # the managed path; this is an ARN, not secret material.
    nativeDbConnectorRoleArn: ""
  superblocks:
    key: <override>
  queue:
    host: '<override>'
    password: '<override>'
    tls: false
    servername: ""
    pool:
      min: 10
      max: 50
    timeout:
      dial: 20s
    batchSize: 2
    executionPool: 50
  kvstore:
    host: '<override>'
    password: '<override>'
    tls: false
    servername: ""
    pool:
      min: 10
      max: 50
    timeout:
      dial: 20s
  taskManager:
    shutdown:
      terminationGracePeriodSeconds: 600 # 10 minutes
      delay: 1m
      maxJitter: 5m
  sandbox:
    poolSize: 5
    gracefulShutdownTimeout: 10m
  worker:
    includeStandardStreams: true
  fleets: {}
