{{- if .Values.databaseLifecycle.enabled }}
{{- $sa := .Values.databaseLifecycle.serviceAccount | default dict }}
{{- /* When `create: false` the chart does NOT render a ServiceAccount; the
       operator is responsible for creating one outside of helm and ensuring
       the Deployment's `serviceAccountName` (computed from
       `databaseLifecycle.serviceAccount.name` or the chart default) matches.
       If it does not, the pod will fail to schedule with `serviceaccount
       "<name>" not found`. IRSA wiring is also the operator's responsibility
       in that case.

       NOTE: Sprig's `default` treats boolean `false` as empty and replaces
       it with the default value. `$sa.create | default true` would
       therefore always evaluate to true and silently ignore an explicit
       `create: false`. Use an explicit `ne` against `false` so the
       contract holds. */ -}}
{{- if ne $sa.create false }}
{{- if not $sa.irsaRoleArn }}
{{- fail "databaseLifecycle.serviceAccount.irsaRoleArn is required when databaseLifecycle.enabled=true and databaseLifecycle.serviceAccount.create is not false" }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "orchestrator.databaseLifecycle.serviceAccountName" . }}
  labels:
    component: orchestrator-database-lifecycle
    app.kubernetes.io/instance: {{ .Values.environment }}
    app.kubernetes.io/name: {{ include "orchestrator.name" . }}
  annotations:
    # IAM Roles for Service Accounts (IRSA): the EKS pod identity webhook
    # projects an OIDC token into the pod and the AWS SDK assumes this role.
    # The trust policy on the role is keyed to this ServiceAccount's
    # namespace/name.
    eks.amazonaws.com/role-arn: {{ $sa.irsaRoleArn | quote }}
    {{- with $sa.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
{{- end }}
