{{- if .Values.databaseLifecycle.enabled }}
{{- if not .Values.server.deploy }}
{{- fail "server.deploy=true is required when databaseLifecycle.enabled=true; the lifecycle worker runs in the orchestrator Deployment" }}
{{- end }}
{{- $serviceAccount := .Values.serviceAccount | default dict }}
{{- if not .Values.databaseLifecycle.sslMode }}
{{- fail "databaseLifecycle.sslMode is required when databaseLifecycle.enabled=true (set to \"verify-full\" with databaseLifecycle.sslRootCert pointing at a CA bundle for production, or \"require\" for intra-VPC sandboxes)" }}
{{- end }}
{{- if and (or (eq .Values.databaseLifecycle.sslMode "verify-ca") (eq .Values.databaseLifecycle.sslMode "verify-full")) (not .Values.databaseLifecycle.sslRootCert) }}
{{- fail "databaseLifecycle.sslRootCert is required when sslMode is verify-ca or verify-full" }}
{{- end }}
{{- if and (not $serviceAccount.create) (not $serviceAccount.name) }}
{{- fail "serviceAccount.create=true or serviceAccount.name is required when databaseLifecycle.enabled=true; the lifecycle worker requires an IRSA-capable ServiceAccount" }}
{{- end }}
{{- if not .Values.databaseLifecycle.allowedResourceTypes }}
{{- fail "databaseLifecycle.allowedResourceTypes is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if not .Values.databaseLifecycle.allowedModuleSources }}
{{- fail "databaseLifecycle.allowedModuleSources is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- end }}
{{- if .Values.server.deploy }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchestrator.fullname" . }}
  labels:
    component: orchestrator
    app.kubernetes.io/instance: {{ .Values.environment }}
    app.kubernetes.io/name: {{ include "orchestrator.name" . }}

    # https://docs.datadoghq.com/getting_started/tagging/unified_service_tagging/?tab=kubernetes
    tags.datadoghq.com/env: {{ .Values.environment }}
    tags.datadoghq.com/service: orchestrator
    tags.datadoghq.com/version: {{ .Values.image.tag | quote }}
spec:
  selector:
    matchLabels:
      component: orchestrator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 100%
  template:
    metadata:
      annotations:
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        prometheus.io/scrape: "true"
        prometheus.io/scrape_fast: "true"
      labels:
        component: orchestrator
        app.kubernetes.io/instance: {{ .Values.environment }}
        app.kubernetes.io/name: orchestrator

        # https://docs.datadoghq.com/getting_started/tagging/unified_service_tagging/?tab=kubernetes
        tags.datadoghq.com/env: {{ .Values.environment }}
        tags.datadoghq.com/service: orchestrator
        tags.datadoghq.com/version: {{ .Values.image.tag | quote }}
    spec:
      serviceAccountName: {{ include "orchestrator.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.service.terminationGracePeriodSeconds }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if $.Values.image.credentials }}
      imagePullSecrets:
      - name: orchestrator-docker
      {{- end }}
      containers:
      - name: orchestrator
        image: "{{ .Values.image.repository | default "ghcr.io/superblocksteam/orchestrator" }}:{{ .Values.image.tag | default "latest" }}"
        imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        # TODO(frank): Turn the secure flags into env vars with viper.
        args:
        - "--log.level={{ .Values.service.logLevel }}"
        - "--grpc.port={{ .Values.service.ports.grpc }}"
        - "--http.port={{ .Values.service.ports.http }}"
        - "--grpc.bind=0.0.0.0"
        - "--http.bind=0.0.0.0"
        - "--grpc.msg.req.max={{ .Values.service.grpc.maxMsgReq | int64 }}"
        - "--grpc.msg.res.max={{ .Values.service.grpc.maxMsgRes | int64 }}"
        - "--superblocks.url={{ .Values.superblocks.url }}"
        - "--otel.collector.http.url={{ .Values.observability.tracing.exporter.scheme }}://{{ .Values.observability.tracing.exporter.host }}:{{ .Values.observability.tracing.exporter.port }}{{ .Values.observability.tracing.exporter.path }}"
        - "--telemetry.deployment.type={{ .Values.telemetry.deploymentType }}"
        - "--store.redis.tls={{ .Values.kvstore.enable_tls }}"
        - "--store.redis.host={{ .Values.kvstore.host }}"
        - "--store.redis.servername={{ .Values.kvstore.servername | default .Values.kvstore.host }}"
        - "--store.redis.pool.min={{ .Values.kvstore.pool.min }}"
        - "--store.redis.pool.max={{ .Values.kvstore.pool.max }}"
        - "--store.redis.timeout.dial={{ .Values.kvstore.timeout.dial }}"
        - "--secrets.cache.mode=redis"
        - "--transport.redis.timeout.dial={{ .Values.queue.timeout.dial }}"
        - "--transport.redis.tls={{ .Values.queue.enable_tls }}"
        - "--transport.redis.host={{ .Values.queue.host }}"
        - "--transport.redis.servername={{ .Values.queue.servername | default .Values.queue.host }}"
        - "--transport.redis.pool.min={{ .Values.queue.pool.min }}"
        - "--transport.redis.pool.max={{ .Values.queue.pool.max }}"
        - "--buckets.config=/etc/orchestrator/buckets.json"
        - "--emitter.remote.intake={{ .Values.observability.logs.intake.url }}"
        - "--intake.metadata.url={{ .Values.observability.metadata.intake.url }}"
        - "--intake.event.url={{ .Values.observability.event.intake.url }}"
        - "--launchdarkly.local={{ .Values.launchdarkly.local | default false }}"
        {{- if and .Values.launchdarkly.local .Values.featureFlags.configMapName }}
        - "--launchdarkly.config=/etc/feature-flags/{{ .Values.featureFlags.fileName | default "feature-flags.json" }}"
        {{- end }}
        - "--quotas.enabled=true"
        - "--registration.enabled=false"
        - "--signature.verification.enabled=false"
        - "--auth.jwt.enabled=true"
        - "--auth.jwt.jwks_url={{ .Values.auth.jwt.jwks_url }}"
        - "--file.server.url=http://$(SUPERBLOCKS_AGENT_INTERNAL_HOST):{{$.Values.service.ports.http}}/v2/files"
        - "--events.cloud.enabled={{ .Values.events.cloud.enabled }}"
        - "--handle.cors={{ .Values.server.handleCors }}"
        {{- if .Values.bindings.wasmSandboxEnabled }}
        - "--bindings.wasm_sandbox.enabled=true"
        {{- end }}
        {{- if .Values.pureJs.wasmSandboxEnabled }}
        - "--purejs.wasm_sandbox.enabled=true"
        {{- end }}
        {{- if (.Values.superblocks).dataDomain }}
        - "--data.domain={{ .Values.superblocks.dataDomain }}"
        {{- end }}
        {{- if .Values.databaseLifecycle.enabled }}
        {{- /* Run the database lifecycle worker as a goroutine in the same
               process as the API servers (see cmd/orchestrator/main.go). The
               worker claims dispatches as this process's own agent id — the
               identity the registrar publishes environment profiles under —
               so no separate Deployment or agent id configuration exists. */}}
        - "--database.lifecycle.worker.enabled=true"
        {{- end }}
        env:
        - name: DD_ENV
          value: {{ .Values.environment }}
        - name: DD_SERVICE
          value: orchestrator
        - name: DD_VERSION
          value: {{ .Values.image.tag | quote }}
        - name: SUPERBLOCKS_AGENT_INTERNAL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        {{- include "extra-env" .Values.extraEnv | indent 8 }}
        {{- if .Values.databaseLifecycle.allowedRefPrefixes }}
        - name: SUPERBLOCKS_SECRETS_REFRESOLVER_ALLOWED_REF_PREFIXES
          value: {{ join "," .Values.databaseLifecycle.allowedRefPrefixes | quote }}
        {{- end }}
        - name: SUPERBLOCKS_ORCHESTRATOR_SUPERBLOCKS_KEY
          valueFrom:
            secretKeyRef:
              name: orchestrator-superblocks-key
              key: key
        - name: SUPERBLOCKS_ORCHESTRATOR_LAUNCHDARKLY_APIKEY
          valueFrom:
            secretKeyRef:
              name: orchestrator-launchdarkly
              key: apikey
        - name: SUPERBLOCKS_ORCHESTRATOR_SECRETS_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: orchestrator-secrets-encryption
              key: key
        - name: SUPERBLOCKS_ORCHESTRATOR_TRANSPORT_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: orchestrator-redis
              key: transport
        - name: SUPERBLOCKS_ORCHESTRATOR_STORE_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: orchestrator-redis
              key: store
        - name: SUPERBLOCKS_AGENT_APP_ENV_TEST
          value: {{.Values.agentAppEnvTestValue}}
        {{- if .Values.databaseLifecycle.enabled }}
        {{- /* Database lifecycle worker config. These env vars feed
               databaselifecycle.ConfigFromEnv. The worker's agent id is NOT
               configured here — it is the orchestrator's own per-boot agent
               id, passed in-process (see cmd/orchestrator/main.go). */}}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ROOT_DIR
          value: {{ .Values.databaseLifecycle.rootDir | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_TERRAFORM_BIN
          value: {{ .Values.databaseLifecycle.terraformBin | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_POLL_INTERVAL
          value: {{ .Values.databaseLifecycle.pollInterval | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ALLOWED_RESOURCE_TYPES
          value: {{ join "," .Values.databaseLifecycle.allowedResourceTypes | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ALLOWED_MODULE_SOURCES
          value: {{ join "," .Values.databaseLifecycle.allowedModuleSources | quote }}
        - name: SUPERBLOCKS_POSTGRES_IAM_ALLOWED_ROLE_ARN_PREFIXES
          value: {{ .Values.sandbox_workers.postgres.iamAllowedRoleArnPrefixes | toJson | quote }}
        - name: SUPERBLOCKS_NATIVE_DB_CONNECTOR_ROLE_ARN
          value: {{ .Values.sandbox_workers.postgres.nativeDbConnectorRoleArn | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_SSL_MODE
          value: {{ .Values.databaseLifecycle.sslMode | quote }}
        {{- if .Values.databaseLifecycle.sslRootCert }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_SSL_ROOT_CERT
          value: {{ .Values.databaseLifecycle.sslRootCert | quote }}
        {{- end }}
        {{- end }}
        ports:
        - name: http
          containerPort: {{ .Values.service.ports.http }}
        - name: grpc
          containerPort: {{ .Values.service.ports.grpc }}
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /health
            port: http
        volumeMounts:
        - name: buckets
          mountPath: /etc/orchestrator
          readOnly: true
        - name: tmp
          mountPath: /tmp
        {{- if and .Values.launchdarkly.local .Values.featureFlags.configMapName }}
        - name: feature-flags
          mountPath: /etc/feature-flags
          readOnly: true
        {{- end }}
        {{- if .Values.databaseLifecycle.enabled }}
        {{- /* Per-dispatch tofu workspace lives under an emptyDir at the
               worker's rootDir. The orchestrator user (UID 1001) can't
               mkdir under /var/lib without this mount; the rootDir is
               intentionally not persistent — every dispatch re-materializes
               its terraform tree from the module source allowlist, and
               ledger state lives in the customer DB, not on disk. */}}
        - name: database-lifecycle-work
          mountPath: {{ .Values.databaseLifecycle.rootDir | quote }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
      - name: buckets
        configMap:
          name: orchestrator-buckets-config
      - name: tmp
        emptyDir:
          # default is set to ~4x the maximum file upload size
          sizeLimit: {{ .Values.tmpSizeLimit | default "2048Mi" }}
      {{- if and .Values.launchdarkly.local .Values.featureFlags.configMapName }}
      - name: feature-flags
        configMap:
          name: {{ .Values.featureFlags.configMapName }}
      {{- end }}
      {{- if .Values.databaseLifecycle.enabled }}
      - name: database-lifecycle-work
        emptyDir: {}
      {{- end }}
{{- end }}
