{{- /* ServiceAccount for the main orchestrator Deployment. Required when
       the orchestrator itself needs pod-level AWS identity (e.g. the
       in-process database lifecycle worker's Terraform backend and
       Secrets Manager access). When `serviceAccount.create=false`, the
       Deployment uses `serviceAccount.name` if set; otherwise it falls
       back to the namespace `default` SA, preserving legacy behavior in
       environments that don't need IRSA. Off by default; turn on
       per-overlay. */ -}}
{{- if and .Values.server.deploy (.Values.serviceAccount).create }}
{{- $sa := .Values.serviceAccount }}
{{- if not $sa.irsaRoleArn }}
{{- fail "serviceAccount.irsaRoleArn is required when serviceAccount.create=true" }}
{{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "orchestrator.serviceAccountName" . }}
  labels:
    component: orchestrator
    app.kubernetes.io/instance: {{ .Values.environment }}
    app.kubernetes.io/name: {{ include "orchestrator.name" . }}
  annotations:
    # IAM Roles for Service Accounts (IRSA): the EKS pod identity webhook
    # projects an OIDC token into the pod and the AWS SDK assumes this
    # role. The trust policy on the role must permit
    # `system:serviceaccount:<namespace>:<saName>`.
    eks.amazonaws.com/role-arn: {{ $sa.irsaRoleArn | quote }}
    {{- with $sa.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
