{{- if .Values.databaseLifecycle.enabled }}
{{- if not .Values.databaseLifecycle.allowedResourceTypes }}
{{- fail "databaseLifecycle.allowedResourceTypes is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if not .Values.databaseLifecycle.allowedModuleSources }}
{{- fail "databaseLifecycle.allowedModuleSources is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if not .Values.databaseLifecycle.agentId }}
{{- fail "databaseLifecycle.agentId is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- /* Reject the zero-UUID placeholder. `required` and truthiness checks
       pass on this string, so a separate guard is needed to keep an
       un-edited overlay from deploying. */ -}}
{{- if eq .Values.databaseLifecycle.agentId "00000000-0000-0000-0000-000000000000" }}
{{- fail "databaseLifecycle.agentId is the zero-UUID placeholder; replace with the real database-lifecycle agent UUID before deploying" }}
{{- end }}
{{- if gt (int .Values.databaseLifecycle.replicas) 1 }}
{{- fail "databaseLifecycle.replicas must be 1 while database lifecycle locking is local to each pod" }}
{{- end }}
{{- if not .Values.databaseLifecycle.sslMode }}
{{- fail "databaseLifecycle.sslMode is required when databaseLifecycle.enabled=true (set to \"verify-full\" with databaseLifecycle.sslRootCert pointing at a CA bundle for production, or \"require\" for intra-VPC sandboxes)" }}
{{- end }}
{{- if and (or (eq .Values.databaseLifecycle.sslMode "verify-ca") (eq .Values.databaseLifecycle.sslMode "verify-full")) (not .Values.databaseLifecycle.sslRootCert) }}
{{- fail "databaseLifecycle.sslRootCert is required when sslMode is verify-ca or verify-full" }}
{{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "orchestrator.databaseLifecycle.name" . }}
  labels:
    component: orchestrator-database-lifecycle
    app.kubernetes.io/instance: {{ .Values.environment }}
    app.kubernetes.io/name: {{ include "orchestrator.name" . }}
    tags.datadoghq.com/env: {{ .Values.environment }}
    tags.datadoghq.com/service: orchestrator-database-lifecycle
    tags.datadoghq.com/version: {{ .Values.image.tag | quote }}
spec:
  strategy:
    type: Recreate
  replicas: {{ .Values.databaseLifecycle.replicas }}
  selector:
    matchLabels:
      component: orchestrator-database-lifecycle
  template:
    metadata:
      labels:
        component: orchestrator-database-lifecycle
        app.kubernetes.io/instance: {{ .Values.environment }}
        app.kubernetes.io/name: {{ include "orchestrator.name" . }}
        tags.datadoghq.com/env: {{ .Values.environment }}
        tags.datadoghq.com/service: orchestrator-database-lifecycle
        tags.datadoghq.com/version: {{ .Values.image.tag | quote }}
    spec:
      serviceAccountName: {{ include "orchestrator.databaseLifecycle.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.service.terminationGracePeriodSeconds }}
      # The orchestrator image runs as the non-root `orchestrator` user
      # (UID 1001). The lifecycle worker's rootDir (default
      # /var/lib/superblocks/database-lifecycle) is not part of the image
      # filesystem, so without an explicit volume mount the worker
      # cannot mkdir + write under it. Mount an emptyDir at the rootDir
      # path with fsGroup ownership so the runtime user can write there.
      # The rootDir is intentionally not persistent — every dispatch
      # re-materializes its terraform tree from the module source
      # allowlist, and ledger state lives in the customer DB, not on
      # disk.
      securityContext:
        fsGroup: 1001
      {{- if $.Values.image.credentials }}
      imagePullSecrets:
      - name: orchestrator-docker
      {{- end }}
      volumes:
      - name: database-lifecycle-work
        emptyDir: {}
      containers:
      - name: database-lifecycle
        image: "{{ .Values.image.repository | default "ghcr.io/superblocksteam/orchestrator" }}:{{ .Values.image.tag | default "latest" }}"
        imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
        resources:
          {{- toYaml (.Values.databaseLifecycle.resources | default .Values.resources) | nindent 10 }}
        volumeMounts:
        - name: database-lifecycle-work
          mountPath: {{ .Values.databaseLifecycle.rootDir | quote }}
        args:
        - "--database.lifecycle.worker.enabled=true"
        - "--superblocks.url={{ .Values.superblocks.url }}"
        - "--data.domain={{ .Values.superblocks.dataDomain | default "app.superblocks.com" }}"
        - "--telemetry.remote.enabled=false"
        env:
        - name: DD_ENV
          value: {{ .Values.environment }}
        - name: DD_SERVICE
          value: orchestrator-database-lifecycle
        - name: DD_VERSION
          value: {{ .Values.image.tag | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_AGENT_ID
          value: {{ required "databaseLifecycle.agentId is required when databaseLifecycle.enabled=true" .Values.databaseLifecycle.agentId | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ROOT_DIR
          value: {{ .Values.databaseLifecycle.rootDir | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_TERRAFORM_BIN
          value: {{ .Values.databaseLifecycle.terraformBin | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_POLL_INTERVAL
          value: {{ .Values.databaseLifecycle.pollInterval | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ALLOWED_RESOURCE_TYPES
          value: {{ join "," .Values.databaseLifecycle.allowedResourceTypes | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ALLOWED_MODULE_SOURCES
          value: {{ join "," .Values.databaseLifecycle.allowedModuleSources | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_SSL_MODE
          value: {{ .Values.databaseLifecycle.sslMode | quote }}
        {{- if .Values.databaseLifecycle.sslRootCert }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_SSL_ROOT_CERT
          value: {{ .Values.databaseLifecycle.sslRootCert | quote }}
        {{- end }}
        {{- if .Values.databaseLifecycle.allowedRefPrefixes }}
        - name: SUPERBLOCKS_SECRETS_REFRESOLVER_ALLOWED_REF_PREFIXES
          value: {{ join "," .Values.databaseLifecycle.allowedRefPrefixes | quote }}
        {{- end }}
        - name: SUPERBLOCKS_ORCHESTRATOR_SUPERBLOCKS_KEY
          valueFrom:
            secretKeyRef:
              name: orchestrator-superblocks-key
              key: key
        - name: SUPERBLOCKS_KEY
          valueFrom:
            secretKeyRef:
              name: orchestrator-superblocks-key
              key: key
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
