{{- include "verify.datadomain" $ }}
{{- $databaseLifecycle := .Values.databaseLifecycle | default dict }}
{{- $physicalProvisioning := $databaseLifecycle.physicalProvisioning | default dict }}
{{- $extraEnv := .Values.extraEnv | default dict }}
{{- $hasManualConfig := hasKey $extraEnv "SUPERBLOCKS_DATABASE_LIFECYCLE_CONFIG" }}
{{- if hasKey $databaseLifecycle "enabled" }}
{{- if ne (kindOf $databaseLifecycle.enabled) "bool" }}
{{- fail "databaseLifecycle.enabled must be a boolean" }}
{{- end }}
{{- end }}
{{- if hasKey $physicalProvisioning "enabled" }}
{{- if ne (kindOf $physicalProvisioning.enabled) "bool" }}
{{- fail "databaseLifecycle.physicalProvisioning.enabled must be a boolean" }}
{{- end }}
{{- end }}
{{- if hasKey ($databaseLifecycle.backend | default dict) "useLockfile" }}
{{- if ne (kindOf $databaseLifecycle.backend.useLockfile) "bool" }}
{{- fail "databaseLifecycle.backend.useLockfile must be a boolean" }}
{{- end }}
{{- end }}
{{- if $databaseLifecycle.enabled }}
{{- if hasKey $extraEnv "SUPERBLOCKS_DATABASE_LIFECYCLE_PROFILES" }}
{{- fail "extraEnv.SUPERBLOCKS_DATABASE_LIFECYCLE_PROFILES cannot be combined with databaseLifecycle.enabled; use SUPERBLOCKS_DATABASE_LIFECYCLE_CONFIG" }}
{{- end }}
{{- if not $databaseLifecycle.sslMode }}
{{- fail "databaseLifecycle.sslMode is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if and (or (eq $databaseLifecycle.sslMode "verify-ca") (eq $databaseLifecycle.sslMode "verify-full")) (not $databaseLifecycle.sslRootCert) }}
{{- fail "databaseLifecycle.sslRootCert is required when sslMode is verify-ca or verify-full" }}
{{- end }}
{{- if and (not .Values.serviceAccount.create) (not .Values.serviceAccount.name) }}
{{- fail "serviceAccount.create=true or serviceAccount.name is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if not $databaseLifecycle.allowedResourceTypes }}
{{- fail "databaseLifecycle.allowedResourceTypes is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if not $hasManualConfig }}
{{- if not ($databaseLifecycle.modules.logical | default dict).source }}
{{- fail "databaseLifecycle.modules.logical.source is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if and $physicalProvisioning.enabled (not ($databaseLifecycle.modules.physical | default dict).source) }}
{{- fail "databaseLifecycle.modules.physical.source is required when physical provisioning is enabled" }}
{{- end }}
{{- if not ($databaseLifecycle.backend | default dict).bucket }}
{{- fail "databaseLifecycle.backend.bucket is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if not ($databaseLifecycle.backend | default dict).region }}
{{- fail "databaseLifecycle.backend.region is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- if not $databaseLifecycle.groups }}
{{- fail "databaseLifecycle.groups is required when databaseLifecycle.enabled=true" }}
{{- end }}
{{- $environments := dict }}
{{- range $groupName, $group := $databaseLifecycle.groups }}
{{- $groupPrefix := printf "databaseLifecycle.groups.%s" $groupName }}
{{- if not $group.environments }}
{{- fail (printf "%s.environments is required" $groupPrefix) }}
{{- end }}
{{- if not $group.profiles }}
{{- fail (printf "%s.profiles is required" $groupPrefix) }}
{{- end }}
{{- if not (get ($group.logicalModuleInputs | default dict) "credential_secret_prefix") }}
{{- fail (printf "%s.logicalModuleInputs.credential_secret_prefix is required" $groupPrefix) }}
{{- end }}
{{- if le (int ($group.pool.maxDatabases | default 0)) 0 }}
{{- fail (printf "%s.pool.maxDatabases must be a positive integer" $groupPrefix) }}
{{- end }}
{{- if $physicalProvisioning.enabled }}
{{- if not (get ($group.physicalModuleInputs | default dict) "vpc_id") }}
{{- fail (printf "%s.physicalModuleInputs.vpc_id is required when physical provisioning is enabled" $groupPrefix) }}
{{- end }}
{{- if not (get ($group.physicalModuleInputs | default dict) "subnet_ids") }}
{{- fail (printf "%s.physicalModuleInputs.subnet_ids is required when physical provisioning is enabled" $groupPrefix) }}
{{- end }}
{{- range $workerOwnedInput := list "capacity_max" "credential_resolver" "security_class" }}
{{- if hasKey ($group.physicalModuleInputs | default dict) $workerOwnedInput }}
{{- fail (printf "%s.physicalModuleInputs.%s is worker-owned and must be omitted" $groupPrefix $workerOwnedInput) }}
{{- end }}
{{- end }}
{{- end }}
{{- range $environment := $group.environments }}
{{- if not (has $environment (list "edit" "preview" "deployed")) }}
{{- fail (printf "%s.environments contains unsupported environment %q" $groupPrefix $environment) }}
{{- end }}
{{- if hasKey $environments $environment }}
{{- fail (printf "databaseLifecycle environment %q is configured by both groups %q and %q" $environment (get $environments $environment) $groupName) }}
{{- end }}
{{- $_ := set $environments $environment $groupName }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- $podSecurityContext := deepCopy (.Values.podSecurityContext | default dict) }}
{{- if and $databaseLifecycle.enabled (not (hasKey $podSecurityContext "fsGroup")) }}
{{- $_ := set $podSecurityContext "fsGroup" 1000 }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "superblocks-agent.name" . }}
  labels:
    {{- include "superblocks-agent.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "superblocks-agent.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 100%
  template:
    metadata:
      annotations:
      {{- if .Values.podAnnotations }}
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      {{- end }}
      {{- if .Values.commonPodAnnotations }}
        {{- toYaml .Values.commonPodAnnotations | nindent 8 }}
      {{- end }}
      labels:
        {{- include "superblocks-agent.selectorLabels" . | nindent 8 }}
        {{- include "superblocks-agent.labels" . | nindent 8 }}
        {{- if .Values.podLabels }}
          {{- toYaml .Values.commonPodLabels | nindent 8 }}
        {{- end }}
        {{- if .Values.commonPodLabels }}
          {{- toYaml .Values.commonPodLabels | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 1800 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml $podSecurityContext | nindent 8 }}
      {{- if .Values.initContainers }}
      initContainers:
{{ toYaml .Values.initContainers | indent 6 }}
      {{- end }}
      serviceAccountName: {{ default (include "superblocks-agent.name" $) .Values.serviceAccount.name }}
      {{- if or .Values.volumes .Values.databaseLifecycle.enabled }}
      volumes:
      {{- with .Values.volumes }}
{{ toYaml . | indent 6 }}
      {{- end }}
      {{- if .Values.databaseLifecycle.enabled }}
      - name: database-lifecycle-work
        emptyDir: {}
      {{- end }}
      {{- end }}
      containers:
      {{- if .Values.extraContainers }}
{{ toYaml .Values.extraContainers | indent 6 }}
      {{- end }}
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.ports.http }}
          protocol: TCP
        - name: grpc
          containerPort: {{ .Values.service.ports.grpc }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.service.ports.metrics }}
          protocol: TCP
        livenessProbe:
          {{- toYaml .Values.probes.liveness | nindent 10 }}
        readinessProbe:
          {{- toYaml .Values.probes.readiness | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        envFrom:
        {{- include "superblocks-agent.key" . | indent 8 }}
        {{- include "superblocks-agent.redis-password" . | indent 8 }}
        {{- with (concat .Values.envFrom .Values.envFrom) }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        env:
        - name: SUPERBLOCKS_ORCHESTRATOR_DATA_DOMAIN
          value: {{ default "app.superblocks.com" .Values.superblocks.agentDataDomain }}
        - name: SUPERBLOCKS_ORCHESTRATOR_HANDLE_CORS
          value: {{ .Values.superblocks.handleCors | quote }}
        - name: SUPERBLOCKS_ORCHESTRATOR_AGENT_HOST_URL
          value: {{ required "superblocks.agentHostUrl is required!" .Values.superblocks.agentHostUrl }}
        - name: SUPERBLOCKS_ORCHESTRATOR_AGENT_TAGS
          value: {{ default "profile:*" .Values.superblocks.agentTags | quote }}
        - name: SUPERBLOCKS_ORCHESTRATOR_OTEL_COLLECTOR_HTTP_URL
          value: {{ if .Values.superblocks.telemetry.remoteEnabled }}{{ .Values.superblocks.telemetry.otelCollectorUrl | quote }}{{ else }}""{{ end }}
        - name: SUPERBLOCKS_WORKER_GO_OTEL_COLLECTOR_HTTP_URL
          value: {{ if .Values.superblocks.telemetry.remoteEnabled }}{{ .Values.superblocks.telemetry.otelCollectorUrl | quote }}{{ else }}""{{ end }}
        - name: SUPERBLOCKS_WORKER_SANDBOX_OTEL_COLLECTOR_HTTP_URL
          value: {{ if .Values.superblocks.telemetry.remoteEnabled }}{{ .Values.superblocks.telemetry.otelCollectorUrl | quote }}{{ else }}""{{ end }}
        - name: __SUPERBLOCKS_AGENT_INTAKE_TRACES_ENABLE
          value: {{ .Values.superblocks.telemetry.remoteEnabled | quote }}
        {{- if not .Values.superblocks.telemetry.remoteEnabled }}
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: ""
        {{- end }}
        - name: SUPERBLOCKS_ORCHESTRATOR_EMITTER_REMOTE_INTAKE
          value: {{ .Values.superblocks.telemetry.logIntakeUrl | quote }}
        - name: SUPERBLOCKS_WORKER_GO_EMITTER_REMOTE_ENABLED
          value: {{ .Values.superblocks.telemetry.remoteEnabled | quote }}
        - name: SUPERBLOCKS_WORKER_GO_EMITTER_REMOTE_INTAKE
          value: {{ if .Values.superblocks.telemetry.remoteEnabled }}{{ .Values.superblocks.telemetry.logIntakeUrl | quote }}{{ else }}""{{ end }}
        - name: SUPERBLOCKS_WORKER_SANDBOX_EMITTER_REMOTE_ENABLED
          value: {{ .Values.superblocks.telemetry.remoteEnabled | quote }}
        - name: SUPERBLOCKS_WORKER_SANDBOX_EMITTER_REMOTE_INTAKE
          value: {{ if .Values.superblocks.telemetry.remoteEnabled }}{{ .Values.superblocks.telemetry.logIntakeUrl | quote }}{{ else }}""{{ end }}
        - name: SUPERBLOCKS_ORCHESTRATOR_INTAKE_METADATA_URL
          value: https://metadata.intake.superblocks.com
        - name: SUPERBLOCKS_ORCHESTRATOR_FILE_SERVER_URL
          value: http://127.0.0.1:{{ $.Values.service.ports.http }}/v2/files
        - name: SUPERBLOCKS_ORCHESTRATOR_LOG_LEVEL
          value: {{ .Values.logLevel }}
        - name: SUPERBLOCKS_ORCHESTRATOR_HTTP_PORT
          value: {{ .Values.service.ports.http | quote }}
        - name: SUPERBLOCKS_ORCHESTRATOR_GRPC_PORT
          value: {{ .Values.service.ports.grpc | quote }}
        - name: SUPERBLOCKS_ORCHESTRATOR_METRICS_PORT
          value: {{ .Values.service.ports.metrics | quote }}
        - name: SUPERBLOCKS_ORCHESTRATOR_SUPERBLOCKS_URL
          value: {{ .Values.superblocks.serverUrl }}
        {{- if .Values.superblocks.timeout }}
        - name: SUPERBLOCKS_ORCHESTRATOR_SUPERBLOCKS_TIMEOUT
          value: {{ .Values.superblocks.timeout | quote }}
        {{- end }}
        {{- if (.Values.grpc).maxMsgSize }}
        - name: SUPERBLOCKS_ORCHESTRATOR_GRPC_MSG_RES_MAX
          value: {{.Values.grpc.maxMsgSize | int64 | quote}}
        {{- end }}
        {{- if (.Values.grpc).maxRecvMsgSize }}
        - name: SUPERBLOCKS_ORCHESTRATOR_GRPC_MSG_REQ_MAX
          value: {{.Values.grpc.maxRecvMsgSize | int64 | quote}}
        {{- end }}
        - name: SUPERBLOCKS_PYTHON_EXECUTION_IMPORT_ALLOW_LIST
          value: {{ .Values.superblocks.workers.python.execution.importAllowList | join "," | quote }}
        - name: SUPERBLOCKS_PYTHON_EXECUTION_IMPORT_DENY_LIST
          value: {{ .Values.superblocks.workers.python.execution.importDenyList | join "," | quote }}
        - name: SUPERBLOCKS_PYTHON_EXECUTION_BUILTINS_DENY_LIST
          value: {{ .Values.superblocks.workers.python.execution.builtinsDenyList | join "," | quote }}
        {{- if or .Values.superblocks.secretsEncryptionKey .Values.superblocks.secretsEncryptionKeyExistingSecret }}
        - name: SUPERBLOCKS_ORCHESTRATOR_SECRETS_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              {{- if .Values.superblocks.secretsEncryptionKeyExistingSecret }}
              name: {{ .Values.superblocks.secretsEncryptionKeyExistingSecret }}
              {{- else }}
              name: {{ include "superblocks-agent.secrets-encryption-key-name" . }}
              {{- end }}
              key: SUPERBLOCKS_ORCHESTRATOR_SECRETS_ENCRYPTION_KEY
        {{- end }}
        - name: SUPERBLOCKS_ORCHESTRATOR_TELEMETRY_REMOTE_ENABLED
          value: {{ .Values.superblocks.telemetry.remoteEnabled | quote }}
        - name: SUPERBLOCKS_DEPLOYMENT_TYPE
          value: {{ .Values.superblocks.telemetry.deploymentType | quote }}
        - name: SUPERBLOCKS_POSTGRES_IAM_ALLOWED_ROLE_ARN_PREFIXES
          value: {{ .Values.postgres.iamAllowedRoleArnPrefixes | toJson | quote }}
        {{- if $databaseLifecycle.enabled }}
        - name: SUPERBLOCKS_ORCHESTRATOR_DATABASE_LIFECYCLE_WORKER_ENABLED
          value: "true"
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ROOT_DIR
          value: {{ $databaseLifecycle.rootDir | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_TERRAFORM_BIN
          value: {{ $databaseLifecycle.terraformBin | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_POLL_INTERVAL
          value: {{ $databaseLifecycle.pollInterval | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ALLOWED_RESOURCE_TYPES
          value: {{ join "," $databaseLifecycle.allowedResourceTypes | quote }}
        {{- $allowedModuleSources := list $databaseLifecycle.modules.logical.source }}
        {{- if $physicalProvisioning.enabled }}
        {{- $allowedModuleSources = append $allowedModuleSources $databaseLifecycle.modules.physical.source }}
        {{- end }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_ALLOWED_MODULE_SOURCES
          value: {{ join "," $allowedModuleSources | quote }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_SSL_MODE
          value: {{ $databaseLifecycle.sslMode | quote }}
        {{- if $databaseLifecycle.sslRootCert }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_SSL_ROOT_CERT
          value: {{ $databaseLifecycle.sslRootCert | quote }}
        {{- end }}
        {{- if $databaseLifecycle.allowedRefPrefixes }}
        - name: SUPERBLOCKS_SECRETS_REFRESOLVER_ALLOWED_REF_PREFIXES
          value: {{ join "," $databaseLifecycle.allowedRefPrefixes | quote }}
        {{- end }}
        {{- if not $hasManualConfig }}
        - name: SUPERBLOCKS_DATABASE_LIFECYCLE_CONFIG
          value: {{ include "superblocks-agent.databaseLifecycleConfigJSON" . | quote }}
        {{- end }}
        {{- end }}
        {{- if .Values.extraEnv }}
        {{- include "extra-env" .Values.extraEnv | indent 8 }}
        {{- end }}
        {{- if .Values.databaseLifecycle.enabled }}
        volumeMounts:
        - name: database-lifecycle-work
          mountPath: {{ .Values.databaseLifecycle.rootDir | quote }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
